plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Keystore rilis dibaca dari key.properties (dibuat CI dari GitHub Secrets,
// atau disediakan lokal). Bila tidak ada, build jatuh ke debug signing agar
// `flutter run`/build dev tetap jalan tanpa keystore.
def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new Properties()
def hasReleaseKey = false
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader -> keyProperties.load(reader) }
    def storeFileName = keyProperties['storeFile']
    hasReleaseKey = storeFileName != null && file(storeFileName).exists()
}

android {
    namespace = "com.thepos.the_pos"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        if (hasReleaseKey) {
            release {
                keyAlias = keyProperties['keyAlias']
                keyPassword = keyProperties['keyPassword']
                storeFile = file(keyProperties['storeFile'])
                storePassword = keyProperties['storePassword']
            }
        }
    }

    defaultConfig {
        applicationId = "com.thepos.the_pos"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Pakai keystore rilis bila tersedia; jika tidak, debug signing
            // agar `flutter build apk --release` tetap berhasil di dev.
            signingConfig = hasReleaseKey
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
