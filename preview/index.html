<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The POS · Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* styles.css — The POS · Phone-first · Claude design system
   Warm paper canvas · clay accent · Inter */

/* ───────── Tokens ───────── */
:root {
  --accent:       #c96442;
  --accent-2:     #d97757;
  --canvas:       #ebe8e0;
  --panel:        #fbfaf7;
  --card:         #ffffff;
  --card-hover:   #fbf8f3;
  --ink:          #2a2824;
  --ink-2:        #6c685f;
  --ink-3:        #9d988b;
  --line:         #e7e2d7;
  --line-2:       #dcd6c8;
  --field:        #f1eee7;
  --accent-soft:  color-mix(in srgb, var(--accent) 12%, transparent);
  --accent-line:  color-mix(in srgb, var(--accent) 32%, transparent);
  --accent-ink:   #ffffff;
  --ok:           #4f7b5e;
  --info:         #4a6e94;
  --warn:         #b9702b;
  --sh-1: 0 1px 3px rgba(48,36,22,.06);
  --sh-2: 0 4px 18px rgba(48,36,22,.09);
  --sh-3: 0 18px 52px rgba(40,28,14,.18);
  --r-card:  14px;
  --r-btn:   11px;
  --r-chip:  999px;
  --font:   "Inter", ui-sans-serif, system-ui, sans-serif;
  --serif:  "Inter", Georgia, serif;
}
[data-theme="dark"] {
  --canvas:       #161412;
  --panel:        #211e1c;
  --card:         #2a2623;
  --card-hover:   #322d29;
  --ink:          #ece7dd;
  --ink-2:        #a8a298;
  --ink-3:        #726c63;
  --line:         #383330;
  --line-2:       #463f39;
  --field:        #1c1917;
  --accent-soft:  color-mix(in srgb, var(--accent) 24%, transparent);
  --accent-line:  color-mix(in srgb, var(--accent) 46%, transparent);
  --ok:           #6fa380;
  --info:         #6f97c0;
  --warn:         #d39a52;
  --sh-1: 0 1px 3px rgba(0,0,0,.3);
  --sh-2: 0 4px 18px rgba(0,0,0,.38);
  --sh-3: 0 20px 56px rgba(0,0,0,.58);
}

/* ───────── Reset ───────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font);
  background: #cdc8bd;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
[data-theme="dark"] body { background: #0e0c0b; }
button { font-family: inherit; cursor: pointer; border: 0; padding: 0; background: transparent; }
a { text-decoration: none; }
::selection { background: var(--accent-soft); }

/* ───────── Stage ───────── */
.stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(120% 120% at 50% 0%, #d8d3c8 0%, #c4bfb3 70%);
}
[data-theme="dark"] .stage {
  background: radial-gradient(120% 120% at 50% 0%, #17140f 0%, #0b0a08 75%);
}

/* ───────── Phone device ───────── */
.device {
  width: 390px; height: 844px;
  background: #1e1b18;
  border-radius: 50px;
  padding: 14px 8px 12px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.07),
    0 0 0 8px #111009,
    0 60px 200px rgba(0,0,0,.52),
    0 24px 70px rgba(0,0,0,.38);
  position: relative;
  transform-origin: center center;
}
/* power button */
.device::before {
  content: "";
  position: absolute;
  right: -3px; top: 170px;
  width: 3px; height: 66px;
  background: #2d2925;
  border-radius: 2px 0 0 2px;
}
/* volume buttons */
.device::after {
  content: "";
  position: absolute;
  left: -3px; top: 140px;
  width: 3px; height: 44px;
  background: #2d2925;
  border-radius: 0 2px 2px 0;
  box-shadow: 0 58px 0 #2d2925;
}
.device-island {
  position: absolute;
  top: 18px; left: 50%; transform: translateX(-50%);
  width: 108px; height: 32px;
  background: #0e0c0b;
  border-radius: 18px;
  z-index: 10;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  pointer-events: none;
}
.device-island .cam {
  width: 12px; height: 12px; border-radius: 50%;
  background: #181513;
  border: 1px solid #222;
  box-shadow: 0 0 6px rgba(100,140,255,.25);
}
.screen {
  width: 100%; height: 100%;
  background: var(--canvas);
  border-radius: 38px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}

/* ───────── Status bar ───────── */
.status-bar {
  flex: 0 0 auto;
  padding: 16px 26px 4px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12.5px; font-weight: 700;
  color: var(--ink-2);
}
.status-bar .time { font-variant-numeric: tabular-nums; letter-spacing: .01em; }
.status-bar .icons { display: flex; align-items: center; gap: 5px; }

/* ───────── Top bar ───────── */
.topbar {
  flex: 0 0 auto;
  padding: 6px 12px 8px;
  display: flex; align-items: center; gap: 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.brand-mark {
  width: 36px; height: 36px; border-radius: 10px; flex: 0 0 auto;
  background: linear-gradient(150deg, var(--accent-2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  color: #fff; box-shadow: var(--sh-1);
}
.search {
  flex: 1 1 auto; position: relative; display: flex; align-items: center; min-width: 0;
}
.search > svg { position: absolute; left: 10px; color: var(--ink-3); pointer-events: none; flex: 0 0 auto; }
.search input {
  width: 100%; height: 38px; padding: 0 8px 0 34px;
  border: 1px solid var(--line-2); border-radius: var(--r-btn);
  background: var(--field); color: var(--ink); font: inherit; font-size: 13px;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.search input::placeholder { color: var(--ink-3); }
.search input:focus { border-color: var(--accent-line); background: var(--card); box-shadow: 0 0 0 3px var(--accent-soft); }

.icon-btn {
  flex: 0 0 auto; width: 38px; height: 38px; border-radius: var(--r-btn);
  border: 1px solid var(--line-2); background: var(--card); color: var(--ink-2);
  display: flex; align-items: center; justify-content: center;
  position: relative; transition: background .14s, border-color .14s, color .14s;
}
.icon-btn:hover { background: var(--card-hover); border-color: var(--accent-line); color: var(--ink); }
.icon-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.icon-btn .dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); border: 1.5px solid var(--panel); }

.cashier-av {
  width: 36px; height: 36px; border-radius: 50%; flex: 0 0 auto;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; border: 1.5px solid var(--accent-line);
}

/* ───────── Category tabs ───────── */
.cat-tabs {
  flex: 0 0 auto; display: flex; gap: 6px; padding: 8px 12px;
  overflow-x: auto; scrollbar-width: none; background: var(--canvas);
  border-bottom: 1px solid var(--line);
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex: 0 0 auto; height: 32px; padding: 0 13px; border-radius: var(--r-chip);
  border: 1px solid var(--line-2); background: var(--card); color: var(--ink-2);
  font-size: 12.5px; font-weight: 500; white-space: nowrap;
  transition: background .14s, color .14s, border-color .14s;
}
.cat-tab:hover { background: var(--card-hover); color: var(--ink); }
.cat-tab.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ───────── Products scroll ───────── */
.grid-scroll {
  flex: 1 1 auto; overflow-y: auto; padding: 8px 10px 8px; scrollbar-width: none; min-height: 0;
}
.grid-scroll::-webkit-scrollbar { display: none; }
.grid-head { display: flex; align-items: center; justify-content: space-between; padding: 2px 2px 8px; gap: 8px; }
.grid-head .h { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); }
.grid-head .c { font-size: 10.5px; color: var(--ink-3); white-space: nowrap; }
.view-toggle { display: flex; gap: 4px; }
.vt-btn { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); border: 1px solid transparent; background: transparent; transition: all .13s; }
.vt-btn.on { background: var(--card); border-color: var(--line-2); color: var(--ink); }
.vt-btn:hover { color: var(--ink); }

/* ───────── Grid card ───────── */
.grid { display: grid; gap: 9px; grid-template-columns: repeat(2, 1fr); }
.layout-b .grid { grid-template-columns: repeat(3, 1fr); gap: 7px; }

.pcard {
  position: relative; text-align: left;
  border: 1px solid var(--line); border-radius: var(--r-card);
  background: var(--card); padding: 11px 10px 9px;
  display: flex; flex-direction: column; min-height: 104px;
  box-shadow: var(--sh-1); transition: border-color .13s, transform .13s;
  user-select: none; -webkit-user-select: none;
}
.pcard:active { transform: scale(.975); }
.pcard.incart { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent-line) inset, var(--sh-1); }
.pcard.pressing { transform: scale(.97); border-color: var(--accent); }
.pname {
  font-size: 12.5px; font-weight: 600; line-height: 1.27; letter-spacing: -.004em;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.layout-b .pname { font-size: 11.5px; }
.pmeta { display: flex; align-items: center; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.tag { font-size: 9.5px; font-weight: 600; letter-spacing: .02em; padding: 2px 6px; border-radius: 5px;
  background: var(--field); color: var(--ink-2); text-transform: uppercase; white-space: nowrap; }
.tag.stock-low { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }
.tag.stock-out { background: color-mix(in srgb, #c0392b 13%, transparent); color: #c0392b; }
.pfoot { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; padding-top: 9px; }
.price .cur { font-size: 10px; font-weight: 600; color: var(--ink-3); display: block; }
.price .amt { font-size: 14.5px; font-weight: 700; letter-spacing: -.01em; font-variant-numeric: tabular-nums; white-space: nowrap; }
.layout-b .price .amt { font-size: 13px; }

.add-btn {
  height: 30px; padding: 0 10px; border-radius: 8px;
  border: 1px solid var(--accent); background: var(--accent); color: #fff;
  font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 5px; white-space: nowrap;
  transition: filter .13s, transform .08s;
}
.add-btn:hover { filter: brightness(1.06); }
.add-btn:active { transform: scale(.92); }
.add-btn:disabled { background: var(--line-2); border-color: var(--line-2); color: var(--ink-3); cursor: not-allowed; }
.qty-group {
  display: flex; align-items: center; height: 30px; border-radius: 8px;
  background: var(--accent); color: #fff; overflow: hidden;
}
.qty-group button { width: 28px; height: 30px; background: transparent; color: inherit;
  font-size: 16px; display: flex; align-items: center; justify-content: center; }
.qty-group button:hover { background: rgba(255,255,255,.18); }
.qty-group .n { min-width: 24px; text-align: center; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }

.layout-b .add-btn { height: 27px; padding: 0 8px; font-size: 11.5px; }
.layout-b .qty-group { height: 27px; }
.layout-b .qty-group button { width: 25px; height: 27px; font-size: 14px; }
.layout-b .qty-group .n { min-width: 20px; font-size: 12px; }

.longpress-hint { position: absolute; top: 8px; right: 8px; color: var(--ink-3); opacity: 0; transition: opacity .15s; pointer-events: none; }
.pcard:hover .longpress-hint { opacity: .5; }

/* ───────── List view ───────── */
.plist { display: flex; flex-direction: column; }
.pcard-list {
  display: flex; align-items: center; gap: 11px; padding: 11px 12px;
  border-bottom: 1px solid var(--line); background: var(--card);
  position: relative; user-select: none; -webkit-user-select: none;
  transition: background .12s;
}
.pcard-list:last-child { border-bottom: 0; }
.pcard-list.incart { background: color-mix(in srgb, var(--accent) 5%, var(--card)); }
.pcard-list.incart::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0; }
.pcard-list:first-child { border-radius: var(--r-card) var(--r-card) 0 0; }
.pcard-list:last-child { border-radius: 0 0 var(--r-card) var(--r-card); }
.pcard-list:only-child { border-radius: var(--r-card); }
.pl-info { flex: 1 1 auto; min-width: 0; }
.pl-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
.pl-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.pl-price { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; }
.pl-stepper { flex: 0 0 auto; }

/* ───────── Hold dropdown ───────── */
.hold-dropdown-wrap {
  position: absolute; top: 0; left: 0; right: 0; z-index: 25;
  display: flex; flex-direction: column;
}
.hold-dropdown-scrim { flex: 0 0 auto; background: transparent; }
.hold-dropdown {
  background: var(--panel); border-bottom: 1px solid var(--line);
  padding: 10px 0 12px; box-shadow: 0 8px 28px rgba(40,28,14,.12);
  animation: dropdn .2s cubic-bezier(.2,.8,.3,1);
}
@keyframes dropdn { from { opacity: 0; transform: translateY(-8px); } }
.hd-label { font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; padding: 0 14px 8px; }
.hd-scroll {
  display: flex; gap: 9px; padding: 0 12px 2px;
  overflow-x: auto; scrollbar-width: none;
  scroll-snap-type: x mandatory;
}
.hd-scroll::-webkit-scrollbar { display: none; }
.hd-card {
  flex: 0 0 160px; border-radius: 12px; padding: 11px 12px;
  border: 1.5px solid var(--line-2); background: var(--card);
  display: flex; flex-direction: column; gap: 3px;
  scroll-snap-align: start; cursor: pointer;
  transition: border-color .13s, background .13s;
}
.hd-card:hover { border-color: var(--accent); background: var(--accent-soft); }
.hd-card.hd-new-hold { border-style: dashed; align-items: center; justify-content: center; gap: 6px; color: var(--ink-2); min-height: 80px; }
.hd-card.hd-new-hold:hover { color: var(--accent); }
.hd-name { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hd-meta { font-size: 11px; color: var(--ink-3); }
.hd-total { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 3px; }
.hd-time { font-size: 10.5px; color: var(--ink-3); }

/* ───────── Bottom cart bar ───────── */
.cartbar {
  flex: 0 0 auto; display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; background: var(--panel); border-top: 1px solid var(--line);
  box-shadow: 0 -3px 14px rgba(40,28,14,.07);
}
.cb-count {
  width: 38px; height: 38px; border-radius: 10px; background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; flex: 0 0 auto;
}
.cb-count.empty { background: var(--line-2); color: var(--ink-3); }
.cb-info { flex: 1 1 auto; min-width: 0; }
.cb-lbl { font-size: 10.5px; color: var(--ink-3); }
.cb-total { font-family: var(--serif); font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; line-height: 1.1; }
.cb-total.zero { color: var(--ink-3); }
.cb-actions { display: flex; gap: 7px; flex: 0 0 auto; }
.cb-view {
  height: 40px; padding: 0 12px; border-radius: var(--r-btn); border: 1px solid var(--line-2);
  background: var(--card); color: var(--ink); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.cb-view:hover { border-color: var(--accent-line); }
.cb-pay {
  height: 40px; padding: 0 18px; border-radius: var(--r-btn); background: var(--accent);
  color: #fff; font-size: 13.5px; font-weight: 700; white-space: nowrap;
  box-shadow: var(--sh-1); transition: filter .13s;
}
.cb-pay:hover { filter: brightness(1.05); }
.cb-pay:disabled { background: var(--line-2); color: var(--ink-3); box-shadow: none; cursor: not-allowed; }

/* ───────── Bottom nav ───────── */
.bottom-nav {
  flex: 0 0 auto; height: 58px;
  display: flex; align-items: center; justify-content: space-around;
  background: var(--panel); border-top: 1px solid var(--line);
  padding: 0 4px 2px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 10px; border-radius: 10px; color: var(--ink-3);
  font-size: 10px; font-weight: 600; flex: 1 1 auto;
  transition: color .13s, background .13s; text-decoration: none;
}
.nav-item:hover { color: var(--ink-2); background: var(--field); }
.nav-item.active { color: var(--accent); background: var(--accent-soft); }

/* ───────── Cart bottom sheet ───────── */
.sheet-scrim {
  position: absolute; inset: 0; z-index: 44;
  background: rgba(28,20,12,.42); display: flex; align-items: flex-end;
}
[data-theme="dark"] .sheet-scrim { background: rgba(0,0,0,.55); }
.sheet {
  width: 100%; max-height: 90%; background: var(--panel);
  border-radius: 22px 22px 0 0; box-shadow: var(--sh-3);
  display: flex; flex-direction: column;
  animation: sheetup .28s cubic-bezier(.2,.8,.3,1);
}
.sheet-grip { width: 40px; height: 5px; border-radius: 3px; background: var(--line-2); margin: 10px auto 0; flex: 0 0 auto; }
.sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 8px; flex: 0 0 auto; }
.sheet-title { display: flex; align-items: center; gap: 8px; }
.sheet-title b { font-size: 15px; font-weight: 600; }
.pill { font-size: 11.5px; font-weight: 700; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 2px 8px; }
.sheet-clear { font-size: 12px; color: var(--ink-3); padding: 4px 6px; border-radius: 7px; }
.sheet-clear:hover { color: var(--accent); background: var(--accent-soft); }

/* ───────── Cart items ───────── */
.cart-items { flex: 1 1 auto; overflow-y: auto; scrollbar-width: none; min-height: 0; }
.cart-items::-webkit-scrollbar { display: none; }
.citem { display: flex; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--line); align-items: flex-start; }
.citem:last-child { border-bottom: 0; }
.ci-main { flex: 1 1 auto; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
.ci-sub { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
.ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: 0 0 auto; }
.ci-total { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.ci-step { display: flex; align-items: center; height: 28px; border: 1px solid var(--line-2); border-radius: 8px; background: var(--card); overflow: hidden; }
.ci-step button { width: 26px; height: 28px; background: transparent; color: var(--ink-2); font-size: 15px; display: flex; align-items: center; justify-content: center; }
.ci-step button:hover { background: var(--field); color: var(--accent); }
.ci-step .n { min-width: 22px; text-align: center; font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; }

.cart-empty { padding: 36px 20px; text-align: center; color: var(--ink-3); }
.cart-empty .ico { width: 52px; height: 52px; border-radius: 14px; background: var(--field); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.cart-empty .et { font-size: 13.5px; font-weight: 600; color: var(--ink-2); }
.cart-empty .es { font-size: 12px; margin-top: 4px; line-height: 1.5; }

/* note + tools */
.cart-tools { flex: 0 0 auto; padding: 8px 12px 4px; display: flex; gap: 6px; position: relative; }
.note-field { flex: 1 1 auto; display: flex; align-items: center; gap: 7px; height: 36px; padding: 0 10px;
  border: 1px dashed var(--line-2); border-radius: var(--r-btn); background: transparent; color: var(--ink-2); font-size: 12.5px; cursor: text; }
.note-field:hover { border-color: var(--accent-line); color: var(--ink); }
.note-field input { border: 0; background: transparent; outline: none; color: var(--ink); font: inherit; font-size: 12.5px; width: 100%; }
.note-field.has { border-style: solid; }

/* ───────── Summary / totals ───────── */
.summary { flex: 0 0 auto; padding: 10px 16px 12px; border-top: 1px solid var(--line); background: var(--panel); }
.srow { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; color: var(--ink-2); padding: 2.5px 0; gap: 8px; }
.srow .v { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 500; white-space: nowrap; }
.srow.disc .v { color: var(--ok); }
.grand { display: flex; align-items: baseline; justify-content: space-between; margin: 6px 0 10px; padding-top: 8px; border-top: 1px dashed var(--line-2); gap: 8px; }
.grand .gl { font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.grand .gv { font-family: var(--serif); font-size: 26px; font-weight: 600; letter-spacing: -.01em; font-variant-numeric: tabular-nums; white-space: nowrap; }

.pay-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 8px; }
.pm { height: 48px; border-radius: var(--r-btn); border: 1px solid var(--line-2); background: var(--card);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  font-size: 11.5px; font-weight: 600; color: var(--ink-2); transition: all .13s; }
.pm:hover { border-color: var(--accent-line); color: var(--ink); }
.pm.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }

.pay-btn { width: 100%; height: 48px; border: 0; border-radius: var(--r-btn);
  background: var(--accent); color: #fff; font-size: 14.5px; font-weight: 700;
  display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
  box-shadow: var(--sh-2); transition: filter .13s; }
.pay-btn:hover { filter: brightness(1.05); }
.pay-btn:disabled { background: var(--line-2); color: var(--ink-3); box-shadow: none; cursor: not-allowed; }
.pay-btn .pb-amt { font-variant-numeric: tabular-nums; }

/* ───────── Payment panel (floating bottom sheet) ───────── */
.pay-scrim { position: absolute; inset: 0; z-index: 50; background: rgba(28,20,12,.38); display: flex; align-items: flex-end; }
[data-theme="dark"] .pay-scrim { background: rgba(0,0,0,.52); }
.pay-panel {
  width: 100%; max-height: 90%; background: var(--panel); border-radius: 22px 22px 0 0;
  box-shadow: var(--sh-3); display: flex; flex-direction: column;
  animation: sheetup .28s cubic-bezier(.2,.8,.3,1);
}
@keyframes sheetup { from { transform: translateY(100%); } }
.pay-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; flex: 0 0 auto; gap: 10px; }
.pay-head > div { flex: 1 1 auto; min-width: 0; }
.pay-head .pt { font-size: 15px; font-weight: 600; }
.pay-head .ps { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
.pay-body { flex: 1 1 auto; overflow-y: auto; padding: 12px 16px 4px; scrollbar-width: none; min-height: 0; }
.pay-body::-webkit-scrollbar { display: none; }
.pay-foot { flex: 0 0 auto; padding: 10px 16px 14px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

/* editable total */
.pay-total-edit {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  padding: 11px 13px; background: var(--field); border-radius: 13px; border: 1px solid var(--line);
}
.pte-label { font-size: 12px; color: var(--ink-2); font-weight: 500; flex: 0 0 auto; }
.pte-cur { font-size: 12.5px; font-weight: 600; color: var(--ink-3); flex: 0 0 auto; }
.pay-total-edit input {
  flex: 1 1 auto; border: 0; background: transparent; outline: none; text-align: right;
  font: 700 21px/1 var(--serif); color: var(--ink); font-variant-numeric: tabular-nums; min-width: 0;
}
.pay-total-edit input:focus { color: var(--accent); }
.pay-edit-note { font-size: 10.5px; color: var(--ink-3); text-align: center; margin-top: -6px; margin-bottom: 10px; }

/* cash display */
.cash-display { background: var(--field); border-radius: 12px; padding: 11px 13px; margin-bottom: 10px; }
.cd-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 2.5px 0; font-size: 12.5px; color: var(--ink-2); }
.cd-row > span:first-child { flex: 0 0 auto; }
.cd-row .v { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; white-space: nowrap; }
.cd-change { padding-top: 7px; margin-top: 5px; border-top: 1px dashed var(--line-2); }
.cd-change .v { color: var(--ok); font-size: 17px; font-family: var(--serif); }

.quick-cash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 10px; }
.qc { height: 38px; border-radius: 9px; border: 1px solid var(--line-2); background: var(--card); color: var(--ink); font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
.qc:hover { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
.qc.exact { border-style: dashed; }

.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.keypad button { height: 46px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--ink); font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
.keypad button:hover { background: var(--card-hover); }
.keypad button:active { background: var(--accent-soft); }

.qr-box { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 6px 0; }
.qr-img { width: 162px; height: 162px; border-radius: 13px; padding: 12px; background: #fff; border: 1px solid var(--line); }

.success { text-align: center; padding: 12px 8px 4px; }
.success .check { width: 66px; height: 66px; border-radius: 50%; background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.success .st { font-size: 17px; font-weight: 700; }
.success .schange { font-family: var(--serif); font-size: 30px; font-weight: 600; margin: 7px 0 2px; }
.success .ssub { font-size: 12px; color: var(--ink-3); }

/* ───────── Drawers ───────── */
.drawer-scrim { position: absolute; inset: 0; z-index: 45; background: rgba(28,20,12,.42); }
[data-theme="dark"] .drawer-scrim { background: rgba(0,0,0,.55); }
.drawer {
  position: absolute; top: 0; right: 0; bottom: 0; width: 86%; max-width: 320px;
  background: var(--panel); border-left: 1px solid var(--line); box-shadow: var(--sh-3);
  display: flex; flex-direction: column; z-index: 46;
  animation: slidein .26s cubic-bezier(.2,.8,.3,1);
}
@keyframes slidein { from { transform: translateX(100%); } }
.drawer-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; flex: 0 0 auto; }
.drawer-head .dt { font-size: 14.5px; font-weight: 600; }
.drawer-body { flex: 1 1 auto; overflow-y: auto; padding: 10px 11px; scrollbar-width: none; }
.drawer-body::-webkit-scrollbar { display: none; }
.drow { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 11px; border: 1px solid var(--line); background: var(--card); margin-bottom: 7px; cursor: pointer; transition: border-color .13s, background .13s; }
.drow:hover { border-color: var(--accent-line); background: var(--card-hover); }
.di { flex: 1 1 auto; min-width: 0; }
.di .n { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.di .s { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.dv { text-align: right; flex: 0 0 auto; }
.dv .a { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.method-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; letter-spacing: .02em; display: inline-block; margin-top: 3px; }
.method-tag.Tunai { background: var(--accent-soft); color: var(--accent); }
.method-tag.QRIS { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
.method-tag.Kartu { background: color-mix(in srgb, var(--info) 16%, transparent); color: var(--info); }

/* ───────── Edit product modal ───────── */
.scrim { position: absolute; inset: 0; z-index: 52; background: rgba(28,20,12,.45); display: flex; align-items: flex-end; }
[data-theme="dark"] .scrim { background: rgba(0,0,0,.6); }
.modal {
  width: 100%; max-height: 92%; background: var(--card); border-radius: 22px 22px 0 0;
  box-shadow: var(--sh-3); overflow: hidden; display: flex; flex-direction: column;
  animation: sheetup .22s cubic-bezier(.2,.8,.3,1);
}
.modal-head { padding: 14px 16px 11px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.modal-head > div:first-child { flex: 1 1 auto; min-width: 0; }
.modal-head .mt { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-head .ms { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.modal-x { width: 30px; height: 30px; border-radius: 8px; background: var(--field); color: var(--ink-2); font-size: 15px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.modal-x:hover { background: var(--line); color: var(--ink); }
.modal-body { padding: 14px 16px; overflow-y: auto; scrollbar-width: none; }
.modal-body::-webkit-scrollbar { display: none; }
.modal-foot { padding: 10px 16px 14px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

.field-label { font-size: 11.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; display: block; }
.tinput { width: 100%; height: 42px; padding: 0 12px; border: 1px solid var(--line-2); border-radius: var(--r-btn);
  background: var(--field); color: var(--ink); font: inherit; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; }
.tinput:focus { border-color: var(--accent-line); background: var(--card); box-shadow: 0 0 0 3px var(--accent-soft); }
select.tinput { -webkit-appearance: none; appearance: none; }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.fgrid .full { grid-column: 1 / -1; }

.btn { height: 42px; padding: 0 14px; border-radius: var(--r-btn); font-size: 13.5px; font-weight: 600; border: 1px solid var(--line-2);
  background: var(--card); color: var(--ink); display: flex; align-items: center; justify-content: center; gap: 6px; transition: background .13s, border-color .13s; }
.btn:hover { background: var(--card-hover); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { filter: brightness(1.05); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
.btn.ghost:hover { background: var(--field); }
.btn.grow { flex: 1 1 auto; }
.btn.danger { color: #c0392b; }

/* ───────── Toast ───────── */
.toast { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); z-index: 60;
  background: var(--ink); color: var(--canvas); padding: 9px 14px; border-radius: 10px;
  font-size: 12.5px; font-weight: 500; box-shadow: var(--sh-3); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
[data-theme="dark"] .toast { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

/* ───────── Variant / unit picker sheet ───────── */
.var-sheet-head { padding: 10px 16px 8px; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
.var-sheet-head .vs-name { font-size: 15px; font-weight: 600; }
.var-sheet-head .vs-sub { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
.var-body { flex: 1 1 auto; overflow-y: auto; padding: 10px 14px 16px; scrollbar-width: none; }
.var-body::-webkit-scrollbar { display: none; }
.v-opt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 11px 13px; border: 1.5px solid var(--line-2); border-radius: var(--r-card);
  margin-bottom: 8px; cursor: pointer; transition: border-color .13s, background .13s;
}
.v-opt:hover { border-color: var(--accent-line); background: var(--accent-soft); }
.v-opt.has { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, var(--card)); }
.v-opt .vo-info { flex: 1 1 auto; min-width: 0; }
.v-opt .vo-label { font-size: 13.5px; font-weight: 600; }
.v-opt .vo-bc { font-size: 10.5px; color: var(--ink-3); margin-top: 2px; letter-spacing: .04em; font-variant-numeric: tabular-nums; }
.v-opt .vo-stock { font-size: 10.5px; }
.v-opt .vo-right { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
.v-opt .vo-price { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.var-badge {
  position: absolute; top: -1px; right: -1px; min-width: 18px; height: 18px;
  border-radius: 9px; background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center;
  padding: 0 4px; pointer-events: none;
}

/* ───────── Transaction history sheet ───────── */
.tx-search {
  flex: 0 0 auto; padding: 8px 14px 8px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px;
}
.tx-search .search { flex: 1 1 auto; }
.tx-filters { flex: 0 0 auto; display: flex; gap: 6px; padding: 8px 14px; border-bottom: 1px solid var(--line); }
.txf { height: 30px; padding: 0 12px; border-radius: var(--r-chip); border: 1px solid var(--line-2);
  background: var(--card); color: var(--ink-2); font-size: 12px; font-weight: 500; white-space: nowrap;
  transition: all .13s; }
.txf.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.tx-list { flex: 1 1 auto; overflow-y: auto; padding: 10px 12px; scrollbar-width: none; }
.tx-list::-webkit-scrollbar { display: none; }

/* transaction row */
.tx-row {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--r-card);
  margin-bottom: 8px; overflow: hidden; transition: border-color .13s;
}
.tx-row:hover { border-color: var(--accent-line); }
.tx-row-head {
  display: flex; align-items: center; gap: 10px; padding: 11px 12px; cursor: pointer;
}
.tx-id { font-size: 11px; font-weight: 700; color: var(--ink-3); letter-spacing: .03em; flex: 0 0 auto; }
.tx-cust { font-size: 13.5px; font-weight: 600; flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.tx-right { text-align: right; flex: 0 0 auto; }
.tx-total { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.status-lunas { background: color-mix(in srgb, var(--ok) 14%, transparent); color: var(--ok);
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-top: 3px; }
.status-hutang { background: color-mix(in srgb, var(--warn) 14%, transparent); color: var(--warn);
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-top: 3px; }
.tx-expand { color: var(--ink-3); transition: transform .18s; }
.tx-expand.open { transform: rotate(180deg); }

/* expanded detail */
.tx-detail { padding: 0 12px 10px; border-top: 1px dashed var(--line); }
.tx-detail-item { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0;
  font-size: 12px; color: var(--ink-2); }
.tx-detail-item .n { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-detail-item .v { font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; }
.tx-remaining { display: flex; justify-content: space-between; padding: 7px 0 4px;
  border-top: 1px solid var(--line); margin-top: 4px; }
.tx-remaining .rl { font-size: 11.5px; color: var(--ink-3); }
.tx-remaining .rv { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--warn); }
.tx-actions { display: flex; gap: 7px; padding-top: 8px; }
.tx-action-btn { flex: 1 1 auto; height: 34px; border-radius: 9px; border: 1px solid var(--line-2);
  background: var(--card); color: var(--ink); font-size: 12.5px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: background .13s, border-color .13s; }
.tx-action-btn:hover { border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent); }
.tx-action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.tx-action-btn.primary:hover { filter: brightness(1.05); }

/* partial payment in PaymentPanel */
.pay-type-toggle { display: flex; gap: 7px; margin-bottom: 12px; }
.pt-btn { flex: 1 1 auto; height: 36px; border-radius: var(--r-btn); border: 1px solid var(--line-2);
  background: var(--card); color: var(--ink-2); font-size: 13px; font-weight: 600; transition: all .13s; }
.pt-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ───────── Item note (per-item in cart) ───────── */
.ci-note-btn { font-size: 11px; color: var(--ink-3); border: 0; background: transparent; padding: 0; text-align: left; }
.ci-note-btn:hover { color: var(--accent); }
.ci-note-input { width: 100%; border: 0; border-bottom: 1px dashed var(--line-2); background: transparent;
  outline: none; font: inherit; font-size: 11.5px; color: var(--ink-2); padding: 3px 0; }
.ci-note-input::placeholder { color: var(--ink-3); }
.ci-note-text { font-size: 11px; color: var(--ink-3); font-style: italic; cursor: pointer; }

/* internal note field (below receipt note) */
.internal-note { display: flex; align-items: center; gap: 7px; height: 34px; padding: 0 10px;
  border: 1px dashed var(--line-2); border-radius: var(--r-btn); background: transparent; color: var(--ink-3);
  font-size: 12px; cursor: text; }
.internal-note input { border: 0; background: transparent; outline: none; color: var(--ink-2); font: inherit; font-size: 12px; width: 100%; }
.internal-note.has { border-style: solid; border-color: color-mix(in srgb, var(--info) 40%, transparent); }

/* ───────── Price editor sheet ───────── */
.alt-price-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.alt-price-chip { height: 34px; padding: 0 13px; border-radius: var(--r-chip);
  border: 1px solid var(--line-2); background: var(--card); color: var(--ink-2);
  font-size: 12.5px; font-weight: 600; white-space: nowrap; transition: all .13s; }
.alt-price-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.alt-price-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ───────── Non-tunai dropdown ───────── */
.nontunai-picker { position: relative; margin-bottom: 12px; }
.nontunai-sel { width: 100%; height: 44px; padding: 0 14px; border-radius: var(--r-btn);
  border: 1px solid var(--line-2); background: var(--card); color: var(--ink);
  font: inherit; font-size: 14px; font-weight: 500; display: flex; align-items: center;
  justify-content: space-between; gap: 8px; transition: border-color .13s; }
.nontunai-sel.open { border-color: var(--accent); background: var(--accent-soft); }
.nontunai-sel .ns-label { flex: 1 1 auto; text-align: left; }
.nontunai-sel .ns-data { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.nontunai-drop { position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--card); border: 1px solid var(--line); border-radius: var(--r-card);
  box-shadow: var(--sh-3); z-index: 30; overflow: hidden; }
.ntd-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--line); transition: background .12s; }
.ntd-item:last-child { border-bottom: 0; }
.ntd-item:hover { background: var(--card-hover); }
.ntd-item .nt-name { font-size: 13.5px; font-weight: 600; }
.ntd-item .nt-data { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
.ntd-item.selected { background: var(--accent-soft); }
.ntd-item.selected .nt-name { color: var(--accent); }

/* Non-tunai metadata (QRIS, bank info) */
.method-meta { background: var(--field); border-radius: 13px; padding: 12px 14px; margin-bottom: 12px; text-align: center; }
.method-meta .mm-title { font-size: 12px; font-weight: 700; color: var(--ink-3); margin-bottom: 8px; }
.method-meta .mm-data { font-size: 13.5px; font-weight: 600; color: var(--ink); word-break: break-all; }
.method-meta .mm-sub { font-size: 11px; color: var(--ink-3); margin-top: 4px; }

/* payment notes */
.pay-note-field { display: flex; align-items: center; gap: 8px; height: 38px; padding: 0 12px;
  border: 1px dashed var(--line-2); border-radius: var(--r-btn); margin-top: 10px; }
.pay-note-field input { flex: 1; border: 0; background: transparent; outline: none; font: inherit; font-size: 12.5px; color: var(--ink-2); }
.pay-note-field input::placeholder { color: var(--ink-3); }

/* kembalian / hutang indicator */
.pay-indicator { display: flex; align-items: center; justify-content: space-between;
  padding: 9px 13px; border-radius: 11px; margin-bottom: 10px; font-size: 13px; font-weight: 600; gap: 8px; }
.pay-indicator.kembalian { background: color-mix(in srgb, var(--ok) 14%, transparent); color: var(--ok); }
.pay-indicator.hutang { background: color-mix(in srgb, var(--warn) 14%, transparent); color: var(--warn); }
.pay-indicator.pas { background: var(--accent-soft); color: var(--accent); }
.pay-indicator .piv { font-family: var(--serif); font-size: 18px; font-variant-numeric: tabular-nums; }

/* ───────── Receipt modal ───────── */
.receipt-scrim { position: absolute; inset: 0; z-index: 54; background: rgba(28,20,12,.48); display: flex; align-items: flex-end; }
[data-theme="dark"] .receipt-scrim { background: rgba(0,0,0,.62); }
.receipt-modal { width: 100%; max-height: 94%; background: var(--panel); border-radius: 22px 22px 0 0;
  box-shadow: var(--sh-3); display: flex; flex-direction: column; }
.receipt-preview-wrap { flex: 1 1 auto; overflow-y: auto; display: flex; justify-content: center;
  padding: 14px 16px; background: #d4cfcb; scrollbar-width: none; }
[data-theme="dark"] .receipt-preview-wrap { background: #1a1714; }
.receipt-preview-wrap::-webkit-scrollbar { display: none; }
.receipt-preview-img { max-width: 100%; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,.2); }

/* The thermal receipt HTML template (for capture) */
.rp-paper { background: #fff; width: 300px; padding: 18px 16px 22px; font-family: 'Courier New', 'Lucida Console', monospace; font-size: 13px; color: #111; line-height: 1.4; }
.rp-header { text-align: center; margin-bottom: 12px; }
.rp-store { font-size: 17px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
.rp-info { font-size: 12px; margin-top: 2px; }
.rp-dash { border: none; border-top: 1px dashed #777; margin: 8px 0; }
.rp-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; font-size: 12.5px; }
.rp-meta-right { text-align: right; }
.rp-customer { font-size: 20px; font-weight: 900; margin: 4px 0 8px; letter-spacing: -.01em; }
.rp-item-name { font-weight: 700; font-size: 13.5px; }
.rp-item-row { display: flex; justify-content: space-between; padding-left: 4px; font-size: 12.5px; }
.rp-item-note { padding-left: 4px; font-size: 11.5px; color: #555; font-style: italic; }
.rp-count { font-size: 12.5px; margin: 4px 0; }
.rp-total-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 15px; margin-top: 4px; }
.rp-pay-row { display: flex; justify-content: space-between; font-size: 13px; }
.rp-kembali-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 15px; }
.rp-hutang { display: flex; justify-content: space-between; font-size: 13px; }
.rp-sudah { text-align: right; font-size: 13px; margin-top: 2px; }
.rp-note { margin-top: 10px; font-size: 12px; text-align: center; border-top: 1px dashed #aaa; padding-top: 8px; }
.rp-footer { text-align: center; font-size: 12px; margin-top: 12px; color: #555; }

.hidden { display: none !important; }


/* ════ page: Ringkasan ════ */

    .pg { flex: 1 1 auto; overflow-y: auto; padding: 14px 14px 8px; scrollbar-width: none; min-height: 0; }
    .page-ringkasan .pg::-webkit-scrollbar { display: none; }
    .pg-topbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 14px 10px; background: var(--panel); border-bottom: 1px solid var(--line); }
    .pg-title { font-family: var(--serif); font-size: 20px; font-weight: 500; letter-spacing: -.01em; }
    .pg-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 13px; }
    .kpi { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-card); padding: 13px 13px 11px; }
    .kpi.hi { background: var(--accent); border-color: transparent; }
    .kpi .kl { font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; }
    .kpi.hi .kl { color: rgba(255,255,255,.7); }
    .kpi .kv { font-family: var(--serif); font-size: 19px; font-weight: 600; margin-top: 5px; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi.hi .kv { color: #fff; }
    .kpi .kt { font-size: 11px; color: var(--ok); margin-top: 3px; font-weight: 600; }
    .kpi.hi .kt { color: rgba(255,255,255,.75); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-card); padding: 13px 13px 11px; margin-bottom: 12px; }
    .card-title { font-size: 12.5px; font-weight: 600; margin-bottom: 13px; display: flex; align-items: center; justify-content: space-between; gap: 8px; white-space: nowrap; overflow: hidden; }
    .card-title .ct-main { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-title .ct-sub { font-size: 11px; color: var(--ink-3); font-weight: 400; white-space: nowrap; flex: 0 0 auto; }
    .sec-label { font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .top-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--card);
      border: 1px solid var(--line); border-radius: var(--r-card); margin-bottom: 7px; }
    .tr-rank { width: 24px; height: 24px; border-radius: 7px; background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 800; flex: 0 0 auto; }
    .tr-info { flex: 1 1 auto; min-width: 0; }
    .tr-info .n { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tr-info .s { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .tr-rev { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; }
    .method-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .method-row .ml { font-size: 12.5px; font-weight: 500; flex: 0 0 64px; }
    .method-bar { flex: 1 1 auto; height: 6px; border-radius: 3px; background: var(--line); overflow: hidden; }
    .method-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
    .method-row .mv { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; color: var(--ink-2); }
  

/* ════ page: Laporan ════ */

    .page-laporan .pg{flex:1 1 auto;overflow-y:auto;scrollbar-width:none;min-height:0}
    .page-laporan .pg::-webkit-scrollbar{display:none}
    .page-laporan .pg-topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
    .page-laporan .pg-title{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.01em;flex:1}
    /* date bar */
    .date-bar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--canvas);border-bottom:1px solid var(--line)}
    .date-pill{display:flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:var(--r-chip);border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent);font-size:12.5px;font-weight:600;flex:1;cursor:pointer;white-space:nowrap}
    .date-pill svg{flex:0 0 auto}
    .quick-tabs{flex:0 0 auto;display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
    .qt{height:30px;padding:0 11px;border-radius:var(--r-chip);border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);font-size:12px;font-weight:500;white-space:nowrap;transition:all .13s}
    .qt.on{background:var(--accent);border-color:var(--accent);color:#fff}
    /* content tabs */
    .ctabs{flex:0 0 auto;display:flex;gap:0;border-bottom:2px solid var(--line);background:var(--panel);padding:0 8px}
    .ctab{height:40px;padding:0 13px;border:0;background:transparent;color:var(--ink-3);font-size:13px;font-weight:600;position:relative;transition:color .13s}
    .ctab.on{color:var(--accent)}
    .ctab.on::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
    /* sections */
    .pg-pad{padding:14px 14px 10px}
    .sum-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
    .sum-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:11px 10px}
    .sum-box .sl{font-size:10px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
    .sum-box .sv{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sum-box.ok .sv{color:var(--ok)}.sum-box.warn .sv{color:var(--warn)}.sum-box.acc .sv{color:var(--accent)}
    .card-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:13px;margin-bottom:12px}
    .cbox-title{font-size:12.5px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;overflow:hidden}
    .cbox-title span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cbox-sub{font-size:11px;color:var(--ink-3);white-space:nowrap;flex:0 0 auto}
    /* method rows */
    .meth-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
    .meth-row:last-child{border-bottom:0}
    .meth-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
    .meth-label{flex:1;font-size:12.5px;font-weight:500}
    .meth-cnt{font-size:11px;color:var(--ink-3);flex:0 0 auto}
    .meth-bar-wrap{width:55px;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
    .meth-bar-fill{height:100%;border-radius:3px}
    .meth-amt{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
    /* product rows */
    .sort-tog{display:flex;gap:6px;margin-bottom:10px}
    .stog{height:28px;padding:0 11px;border-radius:var(--r-chip);border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);font-size:11.5px;font-weight:600;transition:all .13s}
    .stog.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
    .prod-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
    .prod-row:last-child{border-bottom:0}
    .prod-rank{width:22px;height:22px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:0 0 auto}
    .prod-rank.g{background:#ffd70022;color:#c8860a}
    .prod-rank.s{background:#c0c0c022;color:var(--ink-2)}
    .prod-rank.b{background:#cd7f3222;color:#b9702b}
    .prod-name{flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .prod-sold{font-size:11px;color:var(--ink-3);margin-top:2px}
    .prod-rev{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
    /* customer rows */
    .cust-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
    .cust-row:last-child{border-bottom:0}
    .cust-av{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto}
    .cust-info{flex:1;min-width:0}
    .cust-info .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cust-info .s{font-size:11px;color:var(--ink-3);margin-top:2px}
    .cust-right{text-align:right;flex:0 0 auto}
    .cust-right .a{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
    .cust-right .m{font-size:10.5px;color:var(--ink-3);margin-top:2px}
    /* tx list */
    .tx-row2{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
    .tx-row2:last-child{border-bottom:0}
    .tx-row2 .ti{flex:1;min-width:0}
    .tx-row2 .ti .n{font-size:13px;font-weight:600}
    .tx-row2 .ti .s{font-size:11px;color:var(--ink-3);margin-top:2px}
    .tx-row2 .tr{text-align:right;flex:0 0 auto}
    .tx-row2 .tr .a{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
    /* export */
    .export-wrap{position:relative;flex:0 0 auto}
    .export-btn{height:34px;padding:0 12px;border-radius:var(--r-btn);border:1px solid var(--line-2);background:var(--card);color:var(--ink);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
    .export-btn:hover{border-color:var(--accent-line)}
    .export-drop{position:absolute;top:calc(100% + 6px);right:0;width:180px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh-3);z-index:30;overflow:hidden}
    .exp-item{display:flex;align-items:center;gap:10px;padding:11px 13px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s}
    .exp-item:hover{background:var(--card-hover)}
    .exp-item:not(:last-child){border-bottom:1px solid var(--line)}
    /* ─── Calendar ─── */
    .cal-sheet{width:100%;max-height:92%;background:var(--panel);border-radius:22px 22px 0 0;box-shadow:var(--sh-3);display:flex;flex-direction:column;animation:sheetup .28s cubic-bezier(.2,.8,.3,1)}
    .cal-phase{display:flex;align-items:center;gap:8px;padding:12px 16px 8px}
    .cal-phase-side{flex:1;padding:9px 12px;border-radius:12px;border:1.5px solid var(--line-2);background:var(--card);cursor:pointer;transition:all .14s}
    .cal-phase-side.active{border-color:var(--accent);background:var(--accent-soft)}
    .cal-phase-side .cpl{font-size:10.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
    .cal-phase-side .cpv{font-size:13.5px;font-weight:600;margin-top:3px;color:var(--ink)}
    .cal-phase-side.active .cpv{color:var(--accent)}
    .cal-arrow{font-size:16px;color:var(--ink-3)}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 6px}
    .cal-nav .cn-lbl{font-family:var(--serif);font-size:18px;font-weight:500}
    .cal-nav button{width:36px;height:36px;border-radius:10px;border:1px solid var(--line-2);background:var(--card);color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .12s}
    .cal-nav button:hover{background:var(--card-hover)}
    .cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 12px 6px;gap:0}
    .cal-days-hdr div{text-align:center;font-size:11px;font-weight:600;color:var(--ink-3)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;row-gap:2px}
    .cal-cell{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;height:40px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .cal-cell.future{opacity:.3;cursor:not-allowed;pointer-events:none}
    .cal-cell.empty{pointer-events:none}
    .cal-range-bg{position:absolute;top:50%;transform:translateY(-50%);height:34px;background:var(--accent-soft);z-index:0;pointer-events:none}
    .cal-range-bg.mid{left:0;right:0}
    .cal-range-bg.s{left:50%;right:0}
    .cal-range-bg.e{left:0;right:50%}
    .cal-num{position:relative;z-index:1;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:500;transition:background .12s}
    .cal-cell:not(.future):hover .cal-num{background:var(--field)}
    .cal-num.cap{background:var(--accent);color:#fff;font-weight:700}
    .cal-num.today-mark{box-shadow:0 0 0 1.5px var(--accent)}
    .cal-dot{position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--accent);z-index:1}
    .cal-foot{padding:12px 16px 16px;border-top:1px solid var(--line);display:flex;gap:8px;flex:0 0 auto}
    /* donut */
    .donut-wrap{display:flex;align-items:center;gap:14px}
    .donut-legend{display:flex;flex-direction:column;gap:7px}
    .dl-row{display:flex;align-items:center;gap:7px;font-size:12px}
    .dl-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
    .dl-label{flex:1;color:var(--ink-2)}
    .dl-pct{font-weight:700;font-size:12.5px}
  

/* ════ page: Pengaturan ════ */

    .page-pengaturan .pg{flex:1 1 auto;overflow-y:auto;scrollbar-width:none;min-height:0;padding:14px 14px 16px}
    .page-pengaturan .pg::-webkit-scrollbar{display:none}
    .page-pengaturan .pg-topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
    .page-pengaturan .pg-title{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.01em;flex:1}
    .sec-head{font-size:10.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;padding:14px 0 6px}
    .sec-head:first-child{padding-top:0}
    .set-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;margin-bottom:4px}
    .set-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
    .set-row:last-child{border-bottom:0}
    .set-row:hover{background:var(--card-hover)}
    .set-row.np{cursor:default}.set-row.np:hover{background:var(--card)}
    .set-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
    .set-info{flex:1;min-width:0}
    .set-info .n{font-size:13.5px;font-weight:500}
    .set-info .s{font-size:11.5px;color:var(--ink-3);margin-top:2px}
    .set-right{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .set-value{font-size:12.5px;color:var(--ink-3)}
    .set-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--ok);color:#fff}
    .set-badge.warn{background:var(--warn)}
    .sw{width:40px;height:23px;border-radius:12px;border:0;padding:2px;background:var(--line-2);transition:background .18s;cursor:pointer;display:flex;align-items:center;flex:0 0 auto}
    .sw.on{background:var(--accent)}
    .sw-thumb{width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .18s cubic-bezier(.2,.8,.3,1);box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .sw.on .sw-thumb{transform:translateX(17px)}
    .staff-card{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);margin-bottom:7px}
    .staff-av{width:38px;height:38px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:0 0 auto}
    .staff-info{flex:1;min-width:0}
    .staff-info .n{font-size:13.5px;font-weight:600}
    .staff-info .s{font-size:11.5px;color:var(--ink-3);margin-top:2px}
    .add-row{width:100%;height:42px;border-radius:var(--r-btn);border:1.5px dashed var(--line-2);background:transparent;color:var(--ink-3);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
    .add-row:hover{border-color:var(--accent-line);color:var(--accent)}
    .danger-btn{width:100%;height:44px;border-radius:var(--r-btn);border:1px solid color-mix(in srgb,#c0392b 30%,transparent);background:color-mix(in srgb,#c0392b 8%,transparent);color:#c0392b;font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}
    .danger-btn:hover{background:color-mix(in srgb,#c0392b 14%,transparent)}

    /* ── Payment method cards ── */
    .pm-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:13px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
    .pm-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:20px}
    .pm-info{flex:1;min-width:0}
    .pm-info .n{font-size:13.5px;font-weight:600}
    .pm-info .s{font-size:11.5px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pm-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;display:inline-block;margin-top:4px;letter-spacing:.03em}
    .pm-type.qris{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}
    .pm-type.bank{background:color-mix(in srgb,var(--info) 15%,transparent);color:var(--info)}
    .pm-type.ewallet{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
    .pm-type.tunai{background:color-mix(in srgb,var(--warn) 14%,transparent);color:var(--warn)}
    .pm-actions{display:flex;gap:6px;flex:0 0 auto;align-items:center}
    .pm-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--card);color:var(--ink-3);display:flex;align-items:center;justify-content:center;transition:all .13s}
    .pm-btn:hover{border-color:var(--accent-line);color:var(--accent)}
    .pm-btn.del:hover{border-color:color-mix(in srgb,#c0392b 35%,transparent);color:#c0392b}

    /* Add payment method modal */

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ─── shared helpers ─── */
function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

/* ─── Faux QR for QRIS preview ─── */
function QRCode({ size = 130 }) {
  const N = 25; let s = 7654321;
  const rnd = () => { s = (s * 1103515245 + 12345) >>> 0; return (s >>> 16) / 65536; };
  const cells = [];
  const finder = (r, c) => (r < 7 && c < 7) || (r < 7 && c >= N - 7) || (r >= N - 7 && c < 7);
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (finder(r, c)) continue;
    if (rnd() > 0.52) cells.push(<rect key={r+'-'+c} x={c} y={r} width="1" height="1" />);
  }
  const Eye = ({ x, y }) => (
    <g><rect x={x} y={y} width="7" height="7" rx="1.2" fill="none" stroke="#111" strokeWidth="1" />
    <rect x={x+2} y={y+2} width="3" height="3" rx=".5" fill="#111" /></g>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 25 25" shapeRendering="crispEdges"
      style={{ background: '#fff', borderRadius: 10, padding: 8, boxShadow: '0 2px 10px rgba(0,0,0,.12)' }}>
      <g fill="#111">{cells}</g>
      <Eye x={0} y={0} /><Eye x={18} y={0} /><Eye x={0} y={18} />
    </svg>
  );
}
