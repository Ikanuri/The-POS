/* ─── Simplified Payment Panel (Tunai / Non-Tunai, just keypad) ─── */
function PaymentPanel({ total: initialTotal, onClose, onDone }) {
  const [editTotal, setEditTotal] = React.useState(initialTotal);
  const [isTunai, setIsTunai] = React.useState(true);
  const [ntMenuOpen, setNtMenu] = React.useState(false);
  const [ntMethod, setNtMethod] = React.useState(null);
  const [tendered, setTendered] = React.useState(0);
  const [payNote, setPayNote] = React.useState('');
  const [stage, setStage] = React.useState('input'); // input | success
  const [lastPayment, setLastPayment] = React.useState(null);
  const [custQuery, setCustQuery] = React.useState('');
  const [custSel, setCustSel]     = React.useState(null);
  const [custOpen, setCustOpen]   = React.useState(false);
  const custMatches = (window.POS?.CUSTOMERS || []).filter(c =>
    custQuery.trim() && !custSel &&
    c.name.toLowerCase().includes(custQuery.trim().toLowerCase())).slice(0, 5);

  const payTotal = Math.max(0, editTotal || 0);
  const kembalian = isTunai ? Math.max(0, tendered - payTotal) : 0;
  const hutang    = isTunai ? (tendered > 0 && tendered < payTotal ? payTotal - tendered : 0) : 0;
  const lunas     = isTunai ? tendered >= payTotal : !!ntMethod;
  const label     = kembalian > 0 ? 'kembalian' : hutang > 0 ? 'hutang' : tendered === payTotal && tendered > 0 ? 'pas' : '';

  /* non-tunai methods from config */
  const allMethods = (window.POS?.getConfig().paymentMethods || []);
  const ntMethods  = allMethods.filter(m => m.type !== 'tunai');

  const denoms = [10000, 20000, 50000, 100000, 200000, 500000];
  const quick  = [payTotal, ...denoms.filter(d => d >= payTotal)].slice(0, 6);

  const press = (d) => {
    if (d === 'C') return setTendered(0);
    if (d === '⌫') return setTendered(t => Math.floor(t / 10));
    setTendered(t => Math.min(t * 10 + d, 99_999_999));
  };

  const confirm = () => {
    const pay = {
      ts: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
      method: isTunai ? 'Tunai' : ntMethod?.name || 'Non-Tunai',
      paid:   isTunai ? tendered : payTotal,
      kembalian, hutang,
      note:   payNote,
      customerId:   custSel ? custSel.id : null,
      customerName: custSel ? custSel.name : (custQuery.trim() || 'Umum'),
    };
    setLastPayment(pay);
    setStage('success');
  };

  if (stage === 'success' && lastPayment) {
    return (
      <div className="pay-scrim">
        <div className="pay-panel" onClick={(e) => e.stopPropagation()}>
          <div className="sheet-grip" />
          <div className="pay-body" style={{ padding: '20px 18px 8px' }}>
            <div className="success">
              <div className="check"><Icon name="check" size={36} /></div>
              <div className="st">{lastPayment.kembalian > 0 ? 'Kembalian' : lastPayment.hutang > 0 ? 'Tercatat Hutang' : 'Pembayaran Berhasil'}</div>
              {lastPayment.kembalian > 0 && <div className="schange">{rp(lastPayment.kembalian)}</div>}
              {lastPayment.hutang > 0 && (
                <div className="schange" style={{ color: 'var(--warn)' }}>{rp(lastPayment.hutang)}</div>
              )}
              {!lastPayment.kembalian && !lastPayment.hutang && <div className="schange">{rp(payTotal)}</div>}
              <div className="ssub">via {lastPayment.method}</div>
            </div>
          </div>
          <div className="pay-foot">
            <button className="btn grow"><Icon name="receipt" size={14} /> Struk</button>
            <button className="btn primary grow" onClick={() => onDone(lastPayment)}>Selesai &amp; Baru</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="pay-scrim" onPointerDown={onClose}>
      <div className="pay-panel" onPointerDown={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="pay-head">
          <div><div className="pt">Pembayaran</div><div className="ps">Ketuk nominal untuk ubah total</div></div>
          <button className="modal-x" onClick={onClose}><Icon name="x" size={15} /></button>
        </div>
        <div className="pay-body">
          {/* customer picker */}
          <div className="cust-picker">
            <span className="cp-label">Pelanggan</span>
            {custSel ? (
              <span className="cp-chip">{custSel.name}
                <button onClick={() => { setCustSel(null); setCustQuery(''); }}><Icon name="x" size={11} /></button>
              </span>
            ) : (
              <input value={custQuery} placeholder="Umum"
                onChange={(e) => { setCustQuery(e.target.value); setCustOpen(true); }}
                onFocus={() => setCustOpen(true)} />
            )}
            {custOpen && custMatches.length > 0 && (
              <div className="cp-drop">
                {custMatches.map(c => (
                  <button key={c.id} onClick={() => { setCustSel(c); setCustOpen(false); }}>
                    {c.name}<span>{c.group || ''}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          {/* editable total */}
          <div className="pay-total-edit">
            <span className="pte-label">Total</span>
            <span className="pte-cur">Rp</span>
            <input type="number" value={editTotal} onFocus={(e) => e.target.select()}
              onChange={(e) => setEditTotal(+e.target.value)} />
          </div>
          <div className="pay-edit-note">Ketuk nominal untuk diskon manual / pembulatan</div>

          {/* Tunai / Non-Tunai toggle */}
          <div className="pay-type-toggle" style={{ marginBottom: 12 }}>
            <button className={'pt-btn' + (isTunai ? ' on' : '')} onClick={() => setIsTunai(true)}>
              💵 Tunai
            </button>
            <button className={'pt-btn' + (!isTunai ? ' on' : '')} onClick={() => { setIsTunai(false); setTendered(0); }}>
              📲 Non-Tunai
            </button>
          </div>

          {/* Tunai section */}
          {isTunai && (
            <>
              <div className="cash-display">
                <div className="cd-row"><span>Total</span><span className="v">{rp(payTotal)}</span></div>
                <div className="cd-row"><span>Diterima</span><span className="v">{rp(tendered)}</span></div>
              </div>
              {tendered > 0 && (
                <div className={'pay-indicator ' + (kembalian > 0 ? 'kembalian' : hutang > 0 ? 'hutang' : 'pas')}>
                  <span>{kembalian > 0 ? 'Kembalian' : hutang > 0 ? 'Sisa / Hutang' : '✓ Uang Pas'}</span>
                  {(kembalian > 0 || hutang > 0) && <span className="piv">{rp(kembalian || hutang)}</span>}
                </div>
              )}
              <div className="quick-cash" style={{ marginBottom: 10 }}>
                {quick.map((d, i) => (
                  <button key={i} className={'qc' + (d === payTotal ? ' exact' : '')}
                    onClick={() => setTendered(d)}>
                    {d === payTotal ? 'Uang Pas' : fmt(d)}
                  </button>
                ))}
              </div>
              <div className="keypad">
                {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => press(n)}>{n}</button>)}
                <button onClick={() => press('C')}>C</button>
                <button onClick={() => press(0)}>0</button>
                <button onClick={() => press('⌫')}>⌫</button>
              </div>
            </>
          )}

          {/* Non-Tunai section */}
          {!isTunai && (
            <div className="nontunai-picker">
              <button className={'nontunai-sel' + (ntMenuOpen ? ' open' : '')} onClick={() => setNtMenu(v => !v)}>
                <span className="ns-label">{ntMethod ? ntMethod.name : 'Pilih metode pembayaran'}</span>
                {ntMethod?.data && <span className="ns-data">{ntMethod.data}</span>}
                <Icon name="chevdown" size={14} stroke sw={2} style={{ flexShrink: 0 }} />
              </button>
              {ntMenuOpen && (
                <>
                  <div style={{ position: 'fixed', inset: 0, zIndex: 29 }} onClick={() => setNtMenu(false)} />
                  <div className="nontunai-drop" style={{ zIndex: 30 }}>
                    {ntMethods.length === 0 && (
                      <div style={{ padding: '14px 16px', fontSize: 13, color: 'var(--ink-3)' }}>
                        Belum ada metode non-tunai. Tambahkan di Pengaturan.
                      </div>
                    )}
                    {ntMethods.map(m => (
                      <div key={m.id} className={'ntd-item' + (ntMethod?.id === m.id ? ' selected' : '')}
                        onClick={() => { setNtMethod(m); setNtMenu(false); }}>
                        <div className="nt-name">{m.name}</div>
                        {m.data && <div className="nt-data">{m.data}</div>}
                        {m.type === 'qris' && <div className="nt-data">QRIS</div>}
                      </div>
                    ))}
                  </div>
                </>
              )}
              {/* Show QRIS or bank info when method selected */}
              {ntMethod && (
                <div className="method-meta" style={{ marginTop: 10 }}>
                  {ntMethod.type === 'qris' ? (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
                      <QRCode size={120} />
                      <div style={{ textAlign: 'center' }}>
                        <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 600 }}>{rp(payTotal)}</div>
                        <div style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 3 }}>GoPay · OVO · DANA · ShopeePay</div>
                      </div>
                    </div>
                  ) : (
                    <>
                      <div className="mm-title">{ntMethod.type === 'bank' ? 'Transfer Bank' : 'E-Wallet'}</div>
                      <div className="mm-data">{ntMethod.name}{ntMethod.data ? ' — ' + ntMethod.data : ''}</div>
                      <div className="mm-sub">{rp(payTotal)}</div>
                    </>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Payment note */}
          <div className="pay-note-field">
            <Icon name="note" size={14} style={{ color: 'var(--ink-3)', flexShrink: 0 }} />
            <input placeholder="Catatan pembayaran (opsional)…" value={payNote}
              onChange={(e) => setPayNote(e.target.value)} />
          </div>
        </div>

        <div className="pay-foot">
          <button className="btn grow" onClick={onClose}>Batal</button>
          <button className="btn primary grow" disabled={isTunai ? tendered === 0 : !ntMethod}
            onClick={confirm}>
            {isTunai && kembalian > 0 ? `Kembali ${rp(kembalian)}` :
             isTunai && hutang > 0    ? `Catat Hutang ${rp(hutang)}` :
             isTunai && lunas         ? 'Konfirmasi Bayar' :
             !isTunai && ntMethod     ? `Proses via ${ntMethod.name}` : 'Pilih metode'}
          </button>
        </div>
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

/* ─── Transaction history sheet ─── */
function TransactionSheet({ history: initialHistory, onClose, onAddTo, onLunasi }) {
  const [history, setHistory] = React.useState(initialHistory);
  const [query, setQuery] = React.useState('');
  const [filter, setFilter] = React.useState('semua');
  const [expanded, setExpanded] = React.useState({});
  const toggle = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));

  const filtered = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    return history.filter(tx => {
      if (filter === 'lunas'  && tx.status !== 'lunas')       return false;
      if (filter === 'hutang' && tx.status !== 'belum_lunas') return false;
      if (!q) return true;
      if (tx.customer.toLowerCase().includes(q)) return true;
      return (tx.items || []).some(i => i.name.toLowerCase().includes(q));
    });
  }, [history, query, filter]);

  const handleLunasi = (tx) => {
    setHistory(h => h.map(t => t.id === tx.id
      ? { ...t, paid: t.total, remaining: 0, status: 'lunas' } : t));
    onLunasi && onLunasi(tx);
  };

  return (
    <div className="sheet-scrim" onClick={onClose}>
      <div className="sheet" style={{ maxHeight: '95%' }} onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-head">
          <div className="sheet-title"><b>Riwayat Transaksi</b></div>
          <button className="modal-x" onClick={onClose}><Icon name="x" size={15} /></button>
        </div>
        <div className="tx-search">
          <div className="search" style={{ flex: 1 }}>
            <Icon name="search" size={15} />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Cari pelanggan atau produk…" />
          </div>
        </div>
        <div className="tx-filters">
          {[['semua','Semua'],['lunas','Lunas'],['hutang','Belum Lunas']].map(([id, lbl]) => (
            <button key={id} className={'txf' + (filter === id ? ' on' : '')} onClick={() => setFilter(id)}>{lbl}</button>
          ))}
          <span style={{ flex: 1 }} /><span style={{ fontSize: 11, color: 'var(--ink-3)', alignSelf: 'center' }}>{filtered.length} transaksi</span>
        </div>
        <div className="tx-list">
          {filtered.map(tx => {
            const open = !!expanded[tx.id];
            const isHutang = tx.status === 'belum_lunas';
            return (
              <div className="tx-row" key={tx.id}>
                <div className="tx-row-head" onClick={() => toggle(tx.id)}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                      <span className="tx-id">#{tx.id?.toUpperCase()}</span>
                      <span className="tx-cust" style={{ color: tx.customerId ? 'var(--accent)' : 'var(--ink-3)', fontStyle: !tx.customerId && (!tx.customer || tx.customer === 'Umum') ? 'italic' : 'normal' }}>{tx.customer}</span>
                    </div>
                    <div className="tx-meta">{(tx.items||[]).length} item · {tx.time}{tx.note ? ' · ' + tx.note : ''}</div>
                  </div>
                  <div className="tx-right">
                    <div className="tx-total">{rp(tx.total)}</div>
                    <span className={isHutang ? 'status-hutang' : 'status-lunas'}>{isHutang ? 'Belum Lunas' : 'Lunas'}</span>
                  </div>
                  <Icon name="chevdown" size={15} stroke sw={2}
                    style={{ color: 'var(--ink-3)', transition: 'transform .18s', transform: open ? 'rotate(180deg)' : 'none', flexShrink: 0 }} />
                </div>
                {open && (
                  <div className="tx-detail">
                    {(tx.items||[]).map((it, i) => (
                      <div className="tx-detail-item" key={i}>
                        <span className="n">{it.qty}× {it.name}{it.ts ? ' · ' + it.ts : ''}</span>
                        <span className="v">{rp(it.price * it.qty)}</span>
                      </div>
                    ))}
                    {tx.discount > 0 && (
                      <div className="tx-detail-item" style={{ color: 'var(--ok)' }}>
                        <span className="n">Diskon</span><span className="v">− {rp(tx.discount)}</span>
                      </div>
                    )}
                    {/* Payment records */}
                    {(tx.payments||[]).length > 0 && (
                      <div style={{ borderTop: '1px dashed var(--line-2)', marginTop: 6, paddingTop: 6 }}>
                        <div style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.04em', marginBottom: 5 }}>Detil Pembayaran</div>
                        {tx.payments.map((p, pi) => (
                          <div key={pi} style={{ fontSize: 12, marginBottom: 5 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 600 }}>
                              <span>{p.ts} · {p.method}</span>
                              <span>Rp {fmt(p.paid)}</span>
                            </div>
                            {p.kembalian > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--ok)', fontSize: 11.5 }}><span>Kembalian</span><span>Rp {fmt(p.kembalian)}</span></div>}
                            {p.hutang > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--warn)', fontSize: 11.5 }}><span>Hutang</span><span>Rp {fmt(p.hutang)}</span></div>}
                          </div>
                        ))}
                        {isHutang && (
                          <div className="tx-remaining">
                            <span className="rl">Total dibayar: {rp(tx.paid)}</span>
                            <span className="rv">Sisa {rp(tx.remaining)}</span>
                          </div>
                        )}
                      </div>
                    )}
                    <div className="tx-actions">
                      {isHutang && <button className="tx-action-btn primary" onClick={() => handleLunasi(tx)}><Icon name="cash" size={14} /> Lunasi</button>}
                      <button className="tx-action-btn" onClick={() => { onAddTo(tx); onClose(); }}><Icon name="plus" size={14} /> Tambah Item</button>
                      <button className="tx-action-btn"><Icon name="receipt" size={14} /> Struk</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {!filtered.length && <div style={{ textAlign: 'center', color: 'var(--ink-3)', padding: '48px 20px', fontSize: 13 }}>Tidak ada transaksi ditemukan.</div>}
          <div style={{ height: 10 }} />
        </div>
      </div>
    </div>
  );
}

function VProductCard({ p, cartQty, onOpen, onAdd, onInc, onDec }) {
  const timer = React.useRef(null);
  const [pressing, setPressing] = React.useState(false);
  const out = p.stock === 0 && !(p.variants||[]).some(v => v.stock > 0);

  const start = (e) => { if (e.button === 2) return; setPressing(true); timer.current = setTimeout(() => { setPressing(false); onOpen(p, true); }, 480); };
  const cancel = () => { clearTimeout(timer.current); setPressing(false); };

  return (
    <div className={'pcard'+(cartQty>0?' incart':'')+(pressing?' pressing':'')}
      onPointerDown={start} onPointerUp={cancel} onPointerLeave={cancel}
      onContextMenu={e => { e.preventDefault(); onOpen(p, true); }}>
      <span className="longpress-hint"><Icon name="edit" size={13} /></span>
      {p.variants && cartQty > 0 && <span className="var-badge">{cartQty}</span>}
      <div className="pname">{p.name}</div>
      <div className="pmeta">
        {!p.variants ? (
          <><span className={'tag'+(out?' stock-out':p.stock<=12?' stock-low':'')}>{out?'Habis':'Stok '+p.stock}</span><span className="tag">/{p.unit}</span></>
        ) : (
          <span className="tag" style={{ color:'var(--accent)', background:'var(--accent-soft)' }}>{p.variants.length} variasi</span>
        )}
      </div>
      <div className="pfoot">
        <div className="price">
          <span className="cur">Rp</span>
          <span className="amt">{p.variants ? fmt(Math.min(...p.variants.map(v=>v.price)))+'+' : fmt(p.price)}</span>
        </div>
        {p.variants ? (
          <button className="add-btn" disabled={out} onPointerDown={e=>e.stopPropagation()} onClick={()=>onOpen(p,false)}>
            {cartQty>0 ? <><Icon name="layers" size={13}/> Ubah</> : <><Icon name="plus" size={13}/> Pilih</>}
          </button>
        ) : cartQty > 0 ? (
          <div className="qty-group" onPointerDown={e=>e.stopPropagation()}>
            <button onClick={()=>onDec(p.id)}><Icon name="minus" size={15}/></button>
            <span className="n">{cartQty}</span>
            <button onClick={()=>onInc(p.id)}><Icon name="plus" size={15}/></button>

          <button className="add-btn" disabled={out} onPointerDown={e=>e.stopPropagation()} onClick={()=>onAdd(p)}>
            <Icon name="plus" size={13}/> Tambah

  );
}

/* ─── Main App ─── */
function CashierApp({ theme, onToggleTheme, layout, onNavigate }) {
  const { CATS } = window.POS;
  const [products, setProducts]     = React.useState(window.POS.PRODUCTS);
  const [history, setHistory]       = React.useState(window.POS.HISTORY);
  const [cart, setCart]             = React.useState({});
  const [priceOverrides, setPrices] = React.useState({}); // cartKey -> price
  const [itemNotes, setItemNotes]   = React.useState({}); // cartKey -> note string
  const [note, setNote]             = React.useState('');
  const [internalNote, setIntNote]  = React.useState('');
  const [query, setQuery]           = React.useState('');
  const [cat, setCat]               = React.useState('all');
  const [viewMode, setViewMode]     = React.useState('grid');
  const [held, setHeld]             = React.useState(window.POS.HELD);

  const [variantProd, setVariantProd]   = React.useState(null);
  const [editProd, setEditProd]         = React.useState(null);
  const [priceEditKey, setPriceEditKey] = React.useState(null);
  const [payOpen, setPayOpen]           = React.useState(false);
  const [sheetOpen, setSheet]           = React.useState(false);
  const [holdOpen, setHoldOpen]         = React.useState(false);
  const [txSheetOpen, setTxSheet]       = React.useState(false);
  const [scan, setScan]                 = React.useState(false);
  const [receiptTx, setReceiptTx]       = React.useState(null);
  const [toast, setToast]               = React.useState(null);
  const searchRef = React.useRef(null);

  /* flat item map */
  const byId = React.useMemo(() => {
    const map = {};
    products.forEach(p => {
      map[p.id] = p;
      (p.variants||[]).forEach(v => {
        map[`${p.id}:${v.id}`] = { id:`${p.id}:${v.id}`, name:`${p.name} — ${v.label}`, price:v.price, unit:v.unit, barcode:v.barcode, stock:v.stock, altPrices:p.altPrices||[] };
      });
    });
    return map;
  }, [products]);

  const flash = (msg) => { setToast(msg); clearTimeout(flash._t); flash._t = setTimeout(()=>setToast(null), 2200); };

  const filtered = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    return products.filter(p =>
      (cat==='all'||p.cat===cat) &&
      (!q || p.name.toLowerCase().includes(q) || p.barcode?.includes(q) || (p.variants||[]).some(v=>v.barcode.includes(q)))
    );
  }, [products, cat, query]);

  const list = React.useMemo(() =>
    Object.entries(cart).map(([key,qty])=>({ key, item:byId[key], qty })).filter(x=>x.item),
    [cart, byId]);

  const count    = list.reduce((s,x)=>s+x.qty, 0);
  const subtotal = list.reduce((s,x)=>{
    const price = priceOverrides[x.key] != null ? priceOverrides[x.key] : x.item.price;
    return s + price * x.qty;
  }, 0);
  const discount = subtotal>=1000000 ? Math.round(subtotal*.03)
    : subtotal>=500000 ? Math.round(subtotal*.02)
    : subtotal>=250000 ? Math.round(subtotal*.01) : 0;
  const total = subtotal - discount;

  const addPlain = (p) => setCart(c => ({ ...c, [p.id]:(c[p.id]||0)+1 }));
  const inc = (key) => setCart(c => ({ ...c, [key]:(c[key]||0)+1 }));
  const dec = (key) => setCart(c => {
    const n = (c[key]||0)-1; const nc = {...c};
    if(n<=0){ delete nc[key]; delete priceOverrides[key]; } else nc[key]=n; return nc;
  });
  const clearCart = () => { setCart({}); setPrices({}); setItemNotes({}); setNote(''); setIntNote(''); };

  const varQty = (p) => p.variants
    ? p.variants.reduce((s,v)=>s+(cart[`${p.id}:${v.id}`]||0), 0)
    : (cart[p.id]||0);

  const openProductAction = (p, forEdit) => {
    if (forEdit) { setEditProd(p); return; }
    if (p.variants) { setVariantProd(p); return; }
    addPlain(p);
  };

  const holdCurrent = () => {
    if (!list.length) return;
    setHeld(h => [{ id:'h'+Date.now(), name:note||'Pelanggan #'+(held.length+1), items:count, total, time:new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) }, ...h]);
    clearCart(); setSheet(false); flash('Pesanan ditahan');
  };
  const resumeHeld = (h) => { flash('Melanjutkan: '+h.name); setNote(h.name); setHeld(prev=>prev.filter(x=>x.id!==h.id)); };

  const onNoteChange = (key, val) => setItemNotes(n => ({ ...n, [key]: val }));
  const onOpenPriceEdit = (key) => setPriceEditKey(key);

  const onSearchKey = (e) => {
    if (e.key !== 'Enter') return;
    const q = query.trim(); if (!q) return;
    for (const p of products) {
      if (p.barcode === q) { addPlain(p); flash(p.name+' ditambahkan'); setQuery(''); return; }
      if (p.variants) { const v = p.variants.find(v=>v.barcode===q); if(v){ inc(`${p.id}:${v.id}`); flash(p.name+' — '+v.label+' ditambahkan'); setQuery(''); return; } }
    }
    if (filtered.length === 1) { addPlain(filtered[0]); flash(filtered[0].name+' ditambahkan'); setQuery(''); }
  };

  /* Build transaction object for receipt / history */
  const buildTx = (payment) => {
    const ts = new Date().toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
    const items = list.map(({ key, item, qty }) => ({
      name: item.name, qty, unit: item.unit,
      price: priceOverrides[key] != null ? priceOverrides[key] : item.price,
      note: itemNotes[key] || '', ts,
    }));
    return {
      id: window.POS.nextTxId(),
      customer: payment.customerName || note || 'Umum',
      customerId: payment.customerId || null,
      note: note, internalNote,
      items, subtotal, discount, total,
      paid:      payment.paid,
      remaining: Math.max(0, total - payment.paid),
      status:    payment.paid >= total ? 'lunas' : 'belum_lunas',
      payments:  [{ ...payment, ts }],
      time: ts,
    };
  };

  const handlePayDone = (payment) => {
    const tx = buildTx(payment);
    setHistory(h => [tx, ...h]);
    setPayOpen(false);
    clearCart();
    setReceiptTx(tx);
    flash('Transaksi selesai');
  };

  const addToTransaction = (tx) => {
    setNote(tx.customer);
    setIntNote('Tambahan #'+tx.id.toUpperCase());
    flash('Tambahkan item untuk '+tx.customer);
  };

  const priceEditItem = priceEditKey ? byId[priceEditKey] : null;
  const priceEditProduct = priceEditItem
    ? (products.find(p => p.id === priceEditKey || priceEditKey.startsWith(p.id+':')) || {})
    : {};

  const layoutClass = viewMode==='list' ? 'layout-list' : layout==='b' ? 'layout-b' : 'layout-a';

  return (
    <div className={'screen '+layoutClass}>
      <StatusBar />
      {holdOpen && (
        <HoldDropdown held={held} hasCart={list.length>0}
          onHoldCurrent={holdCurrent} onResume={resumeHeld} onClose={()=>setHoldOpen(false)} />
      )}

      {/* Top bar */}
      <div className="topbar">
        <div className="brand-mark"><Icon name="layers" size={18}/></div>
        <div className="search">
          <Icon name="search" size={16}/>

function BarChart({ data }) {
  const max = Math.max(...data.map((d) => d.v));
  const W = 330; const H = 80; const cols = data.length;
  const bw = Math.floor(W / cols) - 5;
  const now = new Date().getHours();
  return (
    <svg width={W} height={H + 16} viewBox={`0 0 ${W} ${H + 16}`} style={{ width: '100%' }}>
      {data.map((d, i) => {
        const bh = Math.max(4, Math.round((d.v / max) * (H - 4)));
        const x = i * (W / cols) + 2;
        const y = H - bh;
        const active = d.h === String(now).padStart(2, '0');
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx="4"
              fill={active ? 'var(--accent)' : 'var(--line-2)'} />
            <text x={x + bw / 2} y={H + 14} textAnchor="middle" fontSize="9"
              fill={active ? 'var(--accent)' : 'var(--ink-3)'}
              fontWeight={active ? '700' : '500'}>{d.h}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ── helpers ── */
const TODAY_STR = new Date().toISOString().split('T')[0];
function makeDate(ago) { const d=new Date(); d.setDate(d.getDate()-ago); return d.toISOString().split('T')[0]; }
function fmtDate(s) { if(!s) return '—'; const d=new Date(s+'T00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function fmtShort(s) { if(!s) return '—'; const d=new Date(s+'T00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }

/* ── synthetic data (30 days) ── */
let _s=98765;
const sr=()=>{_s=(_s*1103515245+12345)&0x7fffffff;return _s/0x7fffffff;};
const PROD_POOL=(window.POS?.PRODUCTS||[]).slice(0,14).map(p=>({name:p.name,price:p.price}));
if(!PROD_POOL.length) PROD_POOL.push({name:'Indomie Goreng',price:3200},{name:'Aqua 600ml',price:3500},{name:'Beras 5kg',price:68000});
const CUST_POOL=['Bu Sari','Toko Maju Jaya','Pak Hendra','CV Sinar Baru','Bu Ratna','Warung Pak Dodi','Toko Berkah','Ibu Yuni','Pak Budi','Toko Merdeka','Agen Sejahtera','Koperasi Warga'];
const RPT_METHODS=['Tunai','QRIS','Kartu'];

function genDay(daysAgo) {
  const dateStr=makeDate(daysAgo);
  const txCount=Math.floor(sr()*18)+5;
  const products={};const customers={};const transactions=[];let revenue=0;
  for(let t=0;t<txCount;t++){
    const cust=CUST_POOL[Math.floor(sr()*CUST_POOL.length)];
    const n=Math.floor(sr()*4)+1;const items=[];let tot=0;
    for(let i=0;i<n;i++){
      const pi=Math.floor(sr()*PROD_POOL.length);
      const qty=Math.floor(sr()*8)+1;const price=PROD_POOL[pi].price;const name=PROD_POOL[pi].name;
      items.push({name,qty,price}); tot+=qty*price;
      if(!products[name]) products[name]={sold:0,revenue:0};
      products[name].sold+=qty; products[name].revenue+=qty*price;
    }
    const lunas=sr()>0.12;const paid=lunas?tot:Math.round(tot*(0.3+sr()*0.5));
    revenue+=tot;
    if(!customers[cust]) customers[cust]={txCount:0,total:0,methods:{}};
    customers[cust].txCount++;customers[cust].total+=tot;
    const m=RPT_METHODS[Math.floor(sr()*3)];
    customers[cust].methods[m]=(customers[cust].methods[m]||0)+1;
    const h=7+Math.floor(sr()*10),mi=Math.floor(sr()*60);
    transactions.push({id:`t${dateStr.replace(/-/g,'')}${String(1000+t).slice(1)}`,customer:cust,items,total:tot,paid,remaining:tot-paid,status:lunas?'lunas':'belum_lunas',method:m,time:`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`,date:dateStr});
  }
  return{dateStr,revenue,keluar:Math.round(revenue*(0.08+sr()*0.07)),txCount,products,customers,transactions};
}

const DAILY={};
for(let i=29;i>=0;i--){const d=genDay(i);DAILY[d.dateStr]=d;}
// inject real today history
if(window.POS?.HISTORY){
  const today=DAILY[TODAY_STR]||(DAILY[TODAY_STR]={dateStr:TODAY_STR,revenue:0,keluar:0,txCount:0,products:{},customers:{},transactions:[]});
  window.POS.HISTORY.forEach(tx=>{
    if(today.transactions.some(t=>t.id===tx.id)) return;
    const itms=Array.isArray(tx.items)?tx.items:[];
    today.transactions.unshift({...tx,date:TODAY_STR});
    today.revenue+=tx.total; today.txCount++;
    if(!today.customers[tx.customer]) today.customers[tx.customer]={txCount:0,total:0,methods:{}};
    today.customers[tx.customer].txCount++;today.customers[tx.customer].total+=tx.total;
    itms.forEach(it=>{if(!today.products[it.name]) today.products[it.name]={sold:0,revenue:0};today.products[it.name].sold+=it.qty;today.products[it.name].revenue+=it.qty*it.price;});
  });
}

function agg(start,end){
  const keys=Object.keys(DAILY).filter(k=>k>=start&&k<=end).sort();
  const r={revenue:0,keluar:0,txCount:0,products:{},customers:{},transactions:[],methodTotals:{Tunai:0,QRIS:0,Kartu:0},methodCnt:{Tunai:0,QRIS:0,Kartu:0}};
  keys.forEach(k=>{
    const d=DAILY[k];
    r.revenue+=d.revenue;r.keluar+=d.keluar;r.txCount+=d.txCount;
    d.transactions.forEach(tx=>{r.transactions.push(tx);r.methodTotals[tx.method]=(r.methodTotals[tx.method]||0)+tx.total;r.methodCnt[tx.method]=(r.methodCnt[tx.method]||0)+1;});
    Object.entries(d.products).forEach(([n,p])=>{if(!r.products[n]) r.products[n]={sold:0,revenue:0};r.products[n].sold+=p.sold;r.products[n].revenue+=p.revenue;});
    Object.entries(d.customers).forEach(([n,c])=>{if(!r.customers[n]) r.customers[n]={txCount:0,total:0};r.customers[n].txCount+=c.txCount;r.customers[n].total+=c.total;});
  });
  r.laba=r.revenue-r.keluar;return r;
}

const MONTHS_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function Calendar({initStart,initEnd,onConfirm,onClose}){
  const now=new Date();
  const [vy,setVy]=React.useState(now.getFullYear());
  const [vm,setVm]=React.useState(now.getMonth());
  const [s,setS]=React.useState(initStart||null);
  const [e,setE]=React.useState(initEnd||null);
  const [phase,setPhase]=React.useState('start');

  const prevM=()=>{if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);};
  const nextM=()=>{if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);};

  const toStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const first=new Date(vy,vm,1).getDay();
  const days=new Date(vy,vm+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(toStr(vy,vm,d));

  const click=(ds)=>{
    if(!ds||ds>TODAY_STR) return;
    if(phase==='start'||!s){setS(ds);setE(null);setPhase('end');}
    else if(ds<s){setS(ds);setE(null);setPhase('end');}
    else{setE(ds);setPhase('done');}
  };

  return(
    <div className="sheet-scrim" onClick={onClose}>
      <div className="cal-sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="sheet-grip"/>
        {/* phase bar */}
        <div className="cal-phase">
          <div className={'cal-phase-side'+(phase==='start'?' active':'')} onClick={()=>setPhase('start')}>
            <div className="cpl">Dari</div>
            <div className="cpv">{s?fmtShort(s):'Pilih'}</div>
          </div>
          <span className="cal-arrow">→</span>
          <div className={'cal-phase-side'+((phase==='end'||phase==='done')?' active':'')}>
            <div className="cpl">Sampai</div>
            <div className="cpv">{e?fmtShort(e):s?'Pilih akhir':'—'}</div>
          </div>
        </div>
        {/* nav */}
        <div className="cal-nav">
          <button onClick={prevM}>‹</button>
          <span className="cn-lbl">{MONTHS_ID[vm]} {vy}</span>
          <button onClick={nextM}>›</button>
        </div>
        {/* day headers */}
        <div className="cal-days-hdr">{DAYS_ID.map(d=><div key={d}>{d}</div>)}</div>
        {/* grid */}
        <div className="cal-grid">
          {cells.map((ds,idx)=>{
            if(!ds) return <div key={'_'+idx} className="cal-cell empty"/>;
            const isFuture=ds>TODAY_STR;
            const isToday=ds===TODAY_STR;
            const isCap=ds===s||ds===e;
            const inRange=s&&e&&ds>s&&ds<e;
            const isStart=ds===s&&e&&s!==e;
            const isEnd=ds===e&&s!==e;
            return(
              <div key={ds} className={'cal-cell'+(isFuture?' future':'')} onClick={()=>click(ds)}>
                {inRange && <div className="cal-range-bg mid"/>}
                {isStart  && <div className="cal-range-bg s"/>}
                {isEnd    && <div className="cal-range-bg e"/>}
                <span className={'cal-num'+(isCap?' cap':'')+(isToday&&!isCap?' today-mark':'')}>
                  {new Date(ds+'T00:00').getDate()}
                </span>
                {isToday&&!isCap && <span className="cal-dot"/>}
              </div>
            );
          })}
        </div>
        <div style={{height:10}}/>
        <div className="cal-foot">
          <button className="btn grow" onClick={onClose}>Batal</button>
          <button className="btn primary grow" disabled={!s}
            onClick={()=>onConfirm(s,e||s)}>
            Terapkan {s&&e&&s!==e?`(${fmtShort(s)} – ${fmtShort(e)})`:s?`(${fmtShort(s)})`:''}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Donut chart ── */
function Donut({data}){
  const total=data.reduce((a,b)=>a+b.pct,0);const r=44;const cx=52;const cy=52;const sw=10;
  let ang=-90;
  const arcs=data.map(d=>{
    const deg=(d.pct/total)*360;const rad=a=>(a*Math.PI)/180;
    const x1=cx+r*Math.cos(rad(ang));const y1=cy+r*Math.sin(rad(ang));
    ang+=deg;const x2=cx+r*Math.cos(rad(ang));const y2=cy+r*Math.sin(rad(ang));
    return{...d,d:`M${x1} ${y1} A${r} ${r} 0 ${deg>180?1:0} 1 ${x2} ${y2}`};
  });
  return(
    <div className="donut-wrap">
      <svg width={104} height={104} viewBox="0 0 104 104" style={{flex:'0 0 auto'}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth={sw}/>
        {arcs.map((a,i)=><path key={i} d={a.d} fill="none" stroke={a.color} strokeWidth={sw} strokeLinecap="butt"/>)}
      </svg>
      <div className="donut-legend">
        {data.map((d,i)=>(
          <div className="dl-row" key={i}>
            <div className="dl-dot" style={{background:d.color}}/>
            <span className="dl-label">{d.label}</span>
            <span className="dl-pct">{d.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    ['The POS — Laporan Keuangan'],
    ['Periode', label],
    ['Metrik','Nilai'],
    ['Total Pemasukan', data.revenue],
    ['Total Pengeluaran', data.keluar],
    ['Laba Bersih', data.laba],
    ['Jumlah Transaksi', data.txCount],
  ];
  const ws1=utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:28},{wch:18}];
  utils.book_append_sheet(wb,ws1,'Ringkasan');

  // Sheet 2: Produk Terlaris (3 cols)
  const s2=[['Produk','Qty Terjual','Pendapatan (Rp)']];
  Object.entries(data.products).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,30)
    .forEach(([n,p])=>s2.push([n, p.sold, p.revenue]));
  const ws2=utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:36},{wch:14},{wch:18}];
  utils.book_append_sheet(wb,ws2,'Produk Terlaris');

  // Sheet 3: Pelanggan (3 cols)
  const s3=[['Pelanggan','Transaksi','Total Belanja (Rp)']];
  Object.entries(data.customers).sort((a,b)=>b[1].total-a[1].total).slice(0,30)
    .forEach(([n,c])=>s3.push([n, c.txCount, c.total]));
  const ws3=utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:30},{wch:12},{wch:20}];
  utils.book_append_sheet(wb,ws3,'Pelanggan');

  // Sheet 4: Transaksi — only columns that have data
  const txRows=data.transactions.slice(0,500);
  const hasPaid   = txRows.some(tx=>tx.paid!=null);
  const hasStatus = txRows.some(tx=>tx.status);
  const hasMethod = txRows.some(tx=>tx.payments?.[0]?.method || tx.method);
  const headers=['ID','Pelanggan','Item'];
  if(hasPaid)   headers.push('Total','Dibayar','Sisa');
  if(hasStatus) headers.push('Status');
  if(hasMethod) headers.push('Metode');
  headers.push('Waktu');
  const s4=[headers];
  txRows.forEach(tx=>{
    const itemCnt=Array.isArray(tx.items)?tx.items.length:(tx.items||0);
    const method=tx.payments?.[0]?.method||tx.method||'';
    const row=[tx.id||'', tx.customer||'', itemCnt];
    if(hasPaid)   row.push(tx.total||0, tx.paid||0, tx.remaining||0);
    if(hasStatus) row.push(tx.status==='lunas'?'Lunas':'Belum Lunas');
    if(hasMethod) row.push(method);
    row.push(tx.time||'');
    s4.push(row);
  });
  const ws4=utils.aoa_to_sheet(s4);
  ws4['!cols']=[{wch:14},{wch:24},{wch:6},{wch:16},{wch:16},{wch:14},{wch:14},{wch:14},{wch:8}].slice(0,headers.length);
  utils.book_append_sheet(wb,ws4,'Transaksi');

  writeFile(wb,'LaporanThePOS.xlsx');
}

async function doExportPDF(data,label){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=182; // usable width
  const acc=[201,100,66];

  // Header
  doc.setFontSize(20);doc.setTextColor(...acc);doc.text('The POS',14,20);
  doc.setFontSize(10);doc.setTextColor(90);doc.text('Laporan Keuangan · '+label,14,27);
  doc.setDrawColor(...acc);doc.setLineWidth(0.5);doc.line(14,31,14+PW,31);

  // Ringkasan — 2-col, no header row
  doc.setFontSize(11);doc.setTextColor(40);doc.text('Ringkasan',14,40);
  doc.autoTable({
    startY:44,
    body:[
      ['Total Pemasukan','Rp '+fmt(data.revenue)],
      ['Total Pengeluaran','Rp '+fmt(data.keluar)],
      ['Laba Bersih','Rp '+fmt(data.laba)],
      ['Jumlah Transaksi',String(data.txCount)],
    ],
    theme:'plain',
    styles:{fontSize:10,cellPadding:3},
    columnStyles:{0:{fontStyle:'bold',cellWidth:70},1:{halign:'right',cellWidth:PW-70}},
    tableWidth:PW,
    margin:{left:14},
  });

  // Produk Terlaris — 4 cols with defined widths
  const prods=Object.entries(data.products).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,15);
  if(prods.length){
    let y=doc.lastAutoTable.finalY+9;
    doc.setFontSize(11);doc.setTextColor(40);doc.text('Produk Terlaris',14,y);
    doc.autoTable({
      startY:y+4,
      head:[['#','Produk','Terjual','Pendapatan']],
      body:prods.map(([n,p],i)=>[String(i+1),n,String(p.sold),'Rp '+fmt(p.revenue)]),
      theme:'striped',
      headStyles:{fillColor:acc,fontSize:9,fontStyle:'bold'},
      styles:{fontSize:9,cellPadding:2.5,overflow:'ellipsize'},
      columnStyles:{0:{cellWidth:8,halign:'center'},1:{cellWidth:PW-8-18-32},2:{cellWidth:18,halign:'right'},3:{cellWidth:32,halign:'right'}},
      tableWidth:PW, margin:{left:14},
    });
  }

  // Pelanggan — 3 cols
  const custs=Object.entries(data.customers).sort((a,b)=>b[1].total-a[1].total).slice(0,12);
  if(custs.length){
    let y=doc.lastAutoTable.finalY+9;
    doc.setFontSize(11);doc.setTextColor(40);doc.text('Statistik Pelanggan',14,y);
    doc.autoTable({
      startY:y+4,
      head:[['Pelanggan','Transaksi','Total Belanja']],
      body:custs.map(([n,c])=>[n,String(c.txCount),'Rp '+fmt(c.total)]),
      theme:'striped',
      headStyles:{fillColor:acc,fontSize:9,fontStyle:'bold'},
      styles:{fontSize:9,cellPadding:2.5,overflow:'ellipsize'},
      columnStyles:{0:{cellWidth:PW-20-36},1:{cellWidth:20,halign:'center'},2:{cellWidth:36,halign:'right'}},
      tableWidth:PW, margin:{left:14},
    });
  }

  doc.save('LaporanThePOS.pdf');
}

  const setRange=(q)=>{
    setQuick(q);
    if(q==='today'){setStart(TODAY_STR);setEnd(TODAY_STR);}
    else if(q==='week'){setStart(makeDate(6));setEnd(TODAY_STR);}
    else if(q==='month'){const d=new Date();d.setDate(1);setStart(d.toISOString().split('T')[0]);setEnd(TODAY_STR);}
    else setCal(true);
  };

  const data=React.useMemo(()=>agg(start,end),[start,end]);
  const rangeLabel=start===end?fmtDate(start):`${fmtShort(start)} – ${fmtShort(end)}`;

  const topProds=Object.entries(data.products)
    .sort((a,b)=>b[1][sortProd]-a[1][sortProd]).slice(0,12)
    .map(([name,p])=>({name,...p}));
  const topCusts=Object.entries(data.customers)
    .sort((a,b)=>b[1].total-a[1].total).slice(0,15)
    .map(([name,c])=>({name,...c}));

  const methTotal=data.revenue||1;
  const meths=[
    {label:'Tunai',pct:Math.round((data.methodTotals?.Tunai||0)/methTotal*100),cnt:data.methodCnt?.Tunai||0,amt:data.methodTotals?.Tunai||0,color:'var(--accent)'},
    {label:'QRIS', pct:Math.round((data.methodTotals?.QRIS||0)/methTotal*100), cnt:data.methodCnt?.QRIS||0, amt:data.methodTotals?.QRIS||0, color:'var(--ok)'},
    {label:'Kartu',pct:Math.round((data.methodTotals?.Kartu||0)/methTotal*100),cnt:data.methodCnt?.Kartu||0,amt:data.methodTotals?.Kartu||0,color:'var(--info)'},
  ].filter(m=>m.pct>0);
  if(!meths.length) meths.push({label:'Tunai',pct:100,cnt:0,amt:0,color:'var(--accent)'});

          </button>

            <>
              <div style={{position:'fixed',inset:0,zIndex:29}} onClick={()=>setExp(false)}/>
              <div className="export-drop">
                <div className="exp-item" onClick={()=>{setExp(false);doExportXLSX(data,rangeLabel);}}>
                  <XlsIcon/> Export .xlsx
                </div>
                <div className="exp-item" onClick={()=>{setExp(false);doExportPDF(data,rangeLabel);}}>
                  <PdfIcon/> Export .pdf
                </div>
              </div>
            </>
          )}
        </div>
        <button className="icon-btn" onClick={onToggleTheme}>
          <Icon name={theme==='dark'?'sun':'moon'} size={17} stroke/>
        </button>
      </div>

      {/* date range bar */}
      <div className="date-bar">
        <button className="date-pill" onClick={()=>{setQuick('custom');setCal(true);}}>
          <Icon name="clock" size={14}/>
          <span style={{flex:1,textAlign:'left'}}>{rangeLabel}</span>
          <Icon name="chevdown" size={13} stroke sw={2}/>

      </div>

      {/* quick tabs */}
      <div className="quick-tabs">
        {[['today','Hari Ini'],['week','7 Hari'],['month','Bulan Ini'],['custom','Custom']].map(([q,l])=>(
          <button key={q} className={'qt'+(quick===q?' on':'')} onClick={()=>setRange(q)}>{l}</button>
        ))}

      {/* content tabs */}
      <div className="ctabs">

          <button key={id} className={'ctab'+(tab===id?' on':'')} onClick={()=>setTab(id)}>{lbl}</button>

      <div className="pg">

              <div className="sum-box warn"><div className="sl">Keluar</div><div className="sv">{rp(data.keluar)}</div></div>
              <div className="sum-box acc"><div className="sl">Laba</div><div className="sv">{rp(data.laba)}</div></div>
            </div>
            <div className="card-box">

            </div>

        {tab==='pelanggan'&&(
          <div className="pg-pad">
            <div className="card-box">
              <div className="cbox-title"><span>Statistik Pelanggan</span><span className="cbox-sub">{topCusts.length} pelanggan</span></div>

                  <div className="cust-info">

                    <div className="s">{c.txCount} transaksi · rata-rata {rp(Math.round(c.total/c.txCount))}</div>

                    <div className="a">{rp(c.total)}</div>

                  </div>

              ))}
              {!topCusts.length&&<div style={{textAlign:'center',color:'var(--ink-3)',padding:'32px 0',fontSize:13}}>Belum ada data pelanggan.</div>}
            </div>
          </div>
        )}

        {tab==='transaksi'&&(
          <div className="pg-pad">
            <div className="card-box">
              <div className="cbox-title"><span>Daftar Transaksi</span><span className="cbox-sub">{data.transactions.length} total</span></div>
              {data.transactions.slice(0,30).map((tx,i)=>(

      </div>

      {/* calendar overlay */}

        <Calendar initStart={start} initEnd={end}
          onConfirm={(s,e)=>{setStart(s);setEnd(e);setCal(false);setQuick('custom');}}

        <div className="modal-foot">
          <button className="btn" onClick={onClose}>Batal</button>
          <button className="btn primary" disabled={!canSave} onClick={()=>onSave({
            id: initial?.id || 'pm_'+Date.now(),
            type, name: name.trim(), data: data.trim(),

          })}>

          </button>
        </div>

    const m = newMethods || methods;
    localStorage.setItem('pos_config', JSON.stringify({ store, paymentMethods: m }));

          <div className="pm-card" key={m.id}>
            <div className="pm-icon" style={{ background: (pmTypeColor[m.type]||'var(--accent)')+'18', fontSize:22 }}>
              {PM_TYPE_ICONS[m.type]||'💳'}
            </div>
            <div className="pm-info">
              <div className="n">{m.name}</div>
              {m.data && <div className="s">{m.data}</div>}
              {m.type==='qris' && <div className="s">QRIS · kode QR otomatis</div>}
              <span className={'pm-type '+m.type}>{PM_TYPE_LABELS[m.type]||m.type}</span>
            </div>
            {m.type !== 'tunai' && (
              <div className="pm-actions">
                <button className="pm-btn" title="Edit" onClick={()=>setPmModal(m)}><Icon name="edit" size={13}/></button>
                <button className="pm-btn del" title="Hapus" onClick={()=>delMethod(m.id)}><Icon name="trash" size={13}/></button>
              </div>
            )}
          </div>
        ))}

        {methods.filter(m=>m.type!=='tunai').length === 0 && (
          <div style={{ textAlign:'center', padding:'20px', color:'var(--ink-3)', fontSize:13 }}>
            Belum ada metode non-tunai. Tap "+Tambah" untuk menambahkan.
          </div>
        )}
        <button className="add-row" onClick={()=>setPmModal('new')}><Icon name="plus" size={15}/> Tambah Metode Baru</button>

        {/* Kasir & Shift */}
        <div className="sec-head">Kasir &amp; Shift</div>
        <div className="set-card">
          <div className="set-row np">
            <SetIcon name="receipt" bg="var(--accent)"/>
            <div className="set-info"><div className="n">Rina Wulandari</div><div className="s">Shift Pagi · Kasir Aktif</div></div>
            <span className="set-badge">Aktif</span>
          </div>
          <div className="set-row"><SetIcon name="clock" bg="var(--info)"/>
            <div className="set-info"><div className="n">Ganti Shift</div><div className="s">Tutup shift &amp; mulai baru</div></div>
            <Icon name="chevdown" size={14} stroke sw={2} style={{ color:'var(--ink-3)', transform:'rotate(-90deg)' }}/>
          </div>
        </div>

        {/* Staff */}
        <div className="sec-head">Staf</div>
        {[['Rina Wulandari','Kasir · Shift Pagi','R'],['Budi Santoso','Kasir · Shift Sore','B'],['Sari Dewi','Supervisor','S']].map(([nm,role,init])=>(
          <div className="staff-card" key={nm}>
            <div className="staff-av">{init}</div>
            <div className="staff-info"><div className="n">{nm}</div><div className="s">{role}</div></div>
            <Icon name="chevdown" size={14} stroke sw={2} style={{ color:'var(--ink-3)', transform:'rotate(-90deg)' }}/>
          </div>
        ))}
        <button className="add-row"><Icon name="plus" size={15}/> Tambah Staf</button>

        {/* Preferensi */}
        <div className="sec-head">Preferensi Aplikasi</div>
        <div className="set-card">
          {[
            { key:'darkMode', label:'Mode Gelap',       sub:'Tampilan gelap',          icon:'moon',   bg:'#4a6e94', fn:(v)=>{setP('darkMode',v);onToggleTheme();} },
            { key:'notif',    label:'Notifikasi',       sub:'Stok menipis & laporan',  icon:'bell',   bg:'var(--accent)' },
            { key:'autoBackup',label:'Backup Otomatis', sub:'Simpan data ke cloud',    icon:'layers', bg:'var(--ok)' },
            { key:'roundPrice',label:'Pembulatan Harga',sub:'Bulatkan ke Rp 500',     icon:'cash',   bg:'#b9702b' },
            { key:'taxIncl',  label:'Pajak Inklusif',   sub:'PPN sudah termasuk harga',icon:'card',  bg:'var(--info)' },
          ].map(({ key, label, sub, icon, bg, fn })=>(
            <div className="set-row np" key={key}>
              <SetIcon name={icon} bg={bg}/>
              <div className="set-info"><div className="n">{label}</div><div className="s">{sub}</div></div>
              <Toggle on={prefs[key]} onChange={fn||(v=>setP(key,v))}/>
            </div>
          ))}
        </div>

        <div className="sec-head">Data &amp; Akun</div>
        <button className="danger-btn"><Icon name="trash" size={16}/> Reset Data Transaksi</button>
        <div style={{ height:16 }}/>
      </div>

      {pmModal && (
        <div className="scrim" onPointerDown={()=>setPmModal(null)}>
          <div onPointerDown={e=>e.stopPropagation()}>
            <PayMethodModal
              initial={pmModal === 'new' ? null : pmModal}
              onSave={pmModal === 'new' ? addMethod : editMethod}
              onClose={()=>setPmModal(null)} />
          </div>
        </div>
      )}
    </>
  );
}


/* ════ new pages + root ════ */


/* ─── NEW: Produk page ─── */
function ProdukPage({ theme, onToggleTheme }) {
  const { PRODUCTS, CATS } = window.POS;
  const [q, setQ] = React.useState('');
  const [expanded, setExpanded] = React.useState({});
  const catLabel = (id) => (CATS.find(c => c.id === id) || {}).label || id;
  const s = q.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => !s || p.name.toLowerCase().includes(s)
    || p.barcode?.includes(s) || (p.variants || []).some(v => v.barcode.includes(s)));
  return (
    <>
      <div className="pg-topbar">
        <div className="pg-title">Produk</div>
        <button className="icon-btn" onClick={onToggleTheme}><Icon name={theme === 'dark' ? 'sun' : 'moon'} size={17} /></button>
      </div>
      <div className="pg">
        <div className="search" style={{ marginBottom: 10 }}>
          <Icon name="search" size={16} />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Cari produk / barcode…" />
        </div>
        {filtered.map(p => {
          const out = p.stock === 0 && !(p.variants || []).some(v => v.stock > 0);
          const low = !out && p.stock <= 12;
          const open = !!expanded[p.id];
          return (
            <div className="prd-item" key={p.id}
              onClick={() => p.variants && setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))}>
              <div className="prd-head">
                <div className="prd-info">
                  <div className="prd-name">{p.name}</div>
                  <div className="prd-meta">
                    <span className="tag">{catLabel(p.cat)}</span>
                    {p.variants
                      ? <span className="tag" style={{ color: 'var(--accent)', background: 'var(--accent-soft)' }}>{p.variants.length} variasi</span>
                      : <span className={'tag' + (out ? ' stock-out' : low ? ' stock-low' : '')}>{out ? 'Habis' : 'Stok ' + p.stock}</span>}
                  </div>
                </div>
                <div className="prd-price">{p.variants ? 'Rp ' + fmt(Math.min(...p.variants.map(v => v.price))) + '+' : rp(p.price)}</div>
                {p.variants && <Icon name="chevdown" size={15} stroke sw={2}
                  style={{ color: 'var(--ink-3)', transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .18s', flexShrink: 0 }} />}
              </div>
              {open && p.variants && (
                <div className="prd-variants">
                  {p.variants.map(v => (
                    <div className="prd-var" key={v.id}>
                      <div className="pv-info"><div className="pv-label">{v.label}</div><div className="pv-bc">{v.barcode}</div></div>
                      <div className="pv-right">
                        <div className="pv-price">{rp(v.price)}</div>
                        <div className={'pv-stock' + (v.stock === 0 ? ' out' : v.stock <= 12 ? ' low' : '')}>Stok {v.stock}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        <button className="add-row" style={{ marginTop: 8 }} onClick={() => alert('Tersedia di Phase 2')}>
          <Icon name="plus" size={15} /> Tambah Produk
        </button>
      </div>
    </>
  );
}

/* ─── NEW: Pelanggan page ─── */
function PelangganPage({ theme, onToggleTheme }) {
  const customers = window.POS.CUSTOMERS || [];
  const [q, setQ] = React.useState('');
  const filtered = customers.filter(c => !q.trim() || c.name.toLowerCase().includes(q.trim().toLowerCase()));
  const initials = (n) => n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return (
    <>
      <div className="pg-topbar">
        <div className="pg-title">Pelanggan</div>
        <button className="icon-btn" onClick={onToggleTheme}><Icon name={theme === 'dark' ? 'sun' : 'moon'} size={17} /></button>
      </div>
      <div className="pg">
        <div className="search" style={{ marginBottom: 10 }}>
          <Icon name="search" size={16} />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Cari pelanggan…" />
        </div>
        {filtered.map(c => (
          <div className="cust-item" key={c.id}>
            <div className="cust-av">{initials(c.name)}</div>
            <div className="cust-info">
              <div className="cust-name">{c.name}
                {c.group && <span className={'cust-group ' + (c.group === 'Grosir' ? 'grosir' : 'langganan')}>{c.group}</span>}
              </div>
              <div className="cust-meta">{c.phone} · {fmt(c.points)} pts</div>
              {c.outstandingDebt > 0 && <div className="cust-debt">Hutang {rp(c.outstandingDebt)}</div>}
            </div>
          </div>
        ))}
        <button className="add-row" style={{ marginTop: 8 }} onClick={() => alert('Tersedia di Phase 3')}>
          <Icon name="plus" size={15} /> Tambah Pelanggan
        </button>
      </div>
    </>
  );
}

/* ─── Root App: 6 tab ─── */
const TWEAK_DEFAULTS = { layout: 'a', dark: false, accent: ['#c96442', '#d97757'], radius: 14 };
const PAGES = {
  ringkasan: DashboardPage,
  produk: ProdukPage,
  pelanggan: PelangganPage,
  laporan: LaporanPage,
  pengaturan: PengaturanPage,
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState('kasir');
  const deviceRef = React.useRef(null);

  React.useEffect(() => {
    const r = document.documentElement;
    r.dataset.theme = t.dark ? 'dark' : 'light';
    const a = Array.isArray(t.accent) ? t.accent : [t.accent, t.accent];
    r.style.setProperty('--accent', a[0]);
    r.style.setProperty('--accent-2', a[1] || a[0]);
    r.style.setProperty('--r-card', t.radius + 'px');
    r.style.setProperty('--r-btn', Math.max(6, Math.round(t.radius * 0.78)) + 'px');
  }, [t.dark, t.accent, t.radius]);

  React.useEffect(() => {
    const fit = () => {
      const s = Math.min((window.innerWidth - 56) / 390, (window.innerHeight - 56) / 844);
      if (deviceRef.current) deviceRef.current.style.transform = `scale(${Math.min(s, 1)})`;
    };
    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const theme = t.dark ? 'dark' : 'light';
  const onToggleTheme = () => setTweak('dark', !t.dark);
  const Page = PAGES[tab];

  return (
    <>
      <div className="stage">
        <div className="device" ref={deviceRef}>
          <div className="device-island"><div className="cam" /></div>
          {/* CashierApp selalu mounted agar keranjang tidak hilang saat pindah tab */}
          <div style={{ display: tab === 'kasir' ? 'contents' : 'none' }}>
            <CashierApp theme={theme} onToggleTheme={onToggleTheme} layout={t.layout} onNavigate={setTab} />
          </div>
          {tab !== 'kasir' && (
            <div className={'screen page-' + tab}>
              <StatusBar />
              <Page theme={theme} onToggleTheme={onToggleTheme} />
              <BottomNav active={tab} onNavigate={setTab} />
            </div>
          )}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tata Letak Produk" />
        <TweakRadio label="Kolom default" value={t.layout}
          options={[{ value: 'a', label: '2 Kolom' }, { value: 'b', label: '3 Kolom' }]}
          onChange={(v) => setTweak('layout', v)} />
        <TweakToggle label="Mode gelap" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakSection label="Warna & Bentuk" />
        <TweakColor label="Aksen" value={t.accent}
          options={[['#c96442', '#d97757'], ['#b5563a', '#c9694a'], ['#5b7c52', '#6e9263'], ['#4a6e94', '#5d88b4']]}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSlider label="Kelengkungan" value={t.radius} min={6} max={24} unit="px"
          onChange={(v) => setTweak('radius', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
