name: Build APK

on:
  push:
    branches: [main, 'claude/**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Harus sama dengan versi development (CardTheme API berubah di 3.29+)
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-key.jks
          EOF

      - name: Build APK (release, arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/the-pos-arm64-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-pos-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/the-pos-arm64-release.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/the-pos-arm64-release.apk
          generate_release_notes: true
