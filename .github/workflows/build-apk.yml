name: Build APK

on:
  push:
    branches: [main, 'claude/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-key.jks
          EOF

      - name: Build APK (release, armeabi-v7a + arm64-v8a)
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          APK_NAME="the-pos-v${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"
          echo "APK_PATH=build/app/outputs/flutter-apk/${APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true

      - name: Create dev pre-release (on branch push)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="dev-$(date +%Y%m%d-%H%M%S)"
          BRANCH="${GITHUB_REF#refs/heads/}"
          gh release create "$TAG" "$APK_PATH" \
            --title "Dev Build — ${BRANCH} (${GITHUB_SHA::7})" \
            --notes "Automated dev build from \`${BRANCH}\` @ [\`${GITHUB_SHA::7}\`](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" \
            --prerelease

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APK_NAME}"
          echo "### 📦 APK Download" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[**Download ${APK_NAME}**](${DOWNLOAD_URL})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Direct link: \`${DOWNLOAD_URL}\`" >> "$GITHUB_STEP_SUMMARY"
