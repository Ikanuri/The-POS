name: the_pos
description: "The POS — Aplikasi kasir offline-first untuk toko grosir."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Database (terenkripsi)
  drift: ^2.21.0
  sqlcipher_flutter_libs: ^0.6.0
  sqlite3: ^2.4.0

  # Routing
  go_router: ^14.0.0

  # Crypto
  encrypt: ^5.0.0
  crypto: ^3.0.3

  # Barcode & QR
  mobile_scanner: ^5.2.0
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0

  # Printer thermal Bluetooth
  print_bluetooth_thermal: ^1.0.9
  esc_pos_utils_plus: ^2.0.4

  # WiFi LAN sync
  shelf: ^1.4.0
  network_info_plus: ^5.0.0

  # File & export
  file_picker: ^8.0.0
  excel: ^4.0.6
  pdf: ^3.10.0
  printing: ^5.12.0
  share_plus: ^10.0.0

  # UI
  google_fonts: ^6.0.0

  # Utils
  shared_preferences: ^2.2.0
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.21.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
